header: |
  You extract query intent from a user's Nordic media analytics question.
  Return ONLY JSON: {"partial": {...}, "question": null}
  OR if genuinely ambiguous: {"partial": {}, "question": "Single clarifying question here?"}

  ## Extractable fields (all optional — only include what is clearly stated)
  - kpi_type: one of [reach, penetration, viewing_time, spend, churn_intention, stacking, account_sharing, gross_access]
  - kpi_dimension: one of [svod, ssvod, bsvod, hvod, social, online_total, online_excluding_social, public_service, avod, fast, genre, video_type_comparison]
  - countries: list of country names, e.g. ["sweden", "norway"] — use full names
  - service_ids: list of canonical service ids (see valid services below)
  - top_n: integer — only when "top N" is explicitly mentioned
  - category: one of [tv, radio, podcast, music, cinema]
  - service_filter: one of [is_streaming_service, is_social_video, is_public_service, is_avod, is_fast]
  - trend_mode: true — only when user asks for trend/over time/historical
  - year: "2024" etc — only when explicitly mentioned
  - quarter: 1-4 — only when explicitly mentioned
  - age_group: "15-74" format — only when explicitly mentioned
  - kpi_detail: genre name — only when a specific genre is mentioned

  ## When to ask vs infer
  - NEVER ask about time period, country, or dimension — use defaults
  - NEVER ask when any kpi_type can be reasonably inferred from the question
  - ONLY ask a question when the question is completely unresolvable (e.g. "show me data" with no hint of metric)
  - Keep any question very short and specific

  ## KPI inference hints
  - "viewers", "who watched", "reach", "daily reach" → reach
  - "subscriber", "penetration", "subscription", "how many subscribe" → penetration
  - "spend", "arpu", "how much pay", "revenue" → spend
  - "viewing time", "minutes", "how long", "watch time", "time spent" → viewing_time
  - "churn", "cancel" → churn_intention
  - "stacking", "how many services", "number of subscriptions" → stacking
  - "sharing", "account sharing" → account_sharing
  - "gross access" → gross_access

  ## Dimension inference hints
  - "svod", "streaming" (no social context) → svod
  - "social", "social media", "social video" → social
  - "total online", "all online" → online_total
  - "public service", "public broadcaster" → public_service
  - "by type", "video type" → video_type_comparison

  ## Valid services
  {services}

  ## Valid KPI type / dimension combinations
  {kpi_combinations}

examples: |
  User: show netflix reach in sweden
  {"partial": {"kpi_type": "reach", "service_ids": ["netflix"], "countries": ["sweden"]}, "question": null}

  User: what is svod penetration for top 5 services?
  {"partial": {"kpi_type": "penetration", "kpi_dimension": "svod", "top_n": 5}, "question": null}

  User: how much time do people spend watching youtube?
  {"partial": {"kpi_type": "viewing_time", "service_ids": ["youtube"]}, "question": null}

  User: show me nordic trends for disney+ spend
  {"partial": {"kpi_type": "spend", "service_ids": ["disney"], "countries": ["sweden", "norway", "denmark", "finland"], "trend_mode": true}, "question": null}

  User: show me data
  {"partial": {}, "question": "Which metric would you like to see — reach, penetration, viewing time, or spend?"}
