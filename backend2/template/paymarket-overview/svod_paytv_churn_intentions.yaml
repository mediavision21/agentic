description: SVOD and Pay TV churn intentions — household-weighted Nordic average trend
filters:
  quarter_label:
    choices: [Q1]
    default: [Q1]
sql: |
  SELECT
      n.period_sort,
      n.period_label,
      CASE
          WHEN n.category = 'online_video' AND n.kpi_dimension = 'svod' THEN 'SVOD'
          WHEN n.category = 'tv' THEN 'Pay TV'
      END AS business_model,
      SUM(n.value * n.population_household)
          / NULLIF(SUM(n.population_household), 0) AS churn_intention
  FROM macro.nordic n
  WHERE
      n.kpi_type = 'churn_intention'
      AND n.population_segment = 'subscribers'
      AND n.canonical_name IS NULL
      AND n.age_group = '15-74'
      AND n.value IS NOT NULL
      AND (
          (n.category = 'online_video' AND n.kpi_dimension = 'svod')
          OR n.category = 'tv'
      )
      [[ AND {{country}} ]]
      [[ AND {{year}} ]]
      [[ AND {{quarter_label}} ]]
  GROUP BY n.period_sort, n.period_label, n.category, n.kpi_dimension
  ORDER BY n.period_sort, business_model

plots:
  - id: svod_paytv_churn_intentions
    title: "SVOD and Pay TV churn intentions"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          value: +d.churn_intention,
          period_sort: +d.period_sort
        });
      });

      var periods = Array.from(new Set(
        rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort; }).map(function(d) { return d.period_label; })
      ));

      return Plot.plot({
        width: Math.max(700, periods.length * 80),
        height: 380,
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: null, grid: true, domain: [0, 0.25], tickFormat: ".0%" },
        color: {
          legend: true,
          domain: ["SVOD", "Pay TV"],
          range: ["#52b788", "#2b2a29"]
        },
        marks: [
          Plot.line(rows, {
            x: "period_label",
            y: "value",
            stroke: "business_model",
            curve: "catmull-rom",
            strokeWidth: 2
          }),
          Plot.dot(rows, {
            x: "period_label",
            y: "value",
            fill: "white",
            stroke: "business_model",
            r: 4,
            strokeWidth: 2,
            tip: true
          }),
          Plot.ruleY([0])
        ],
        marginTop: 30,
        marginBottom: 80,
        marginLeft: 50,
        marginRight: 30
      });
