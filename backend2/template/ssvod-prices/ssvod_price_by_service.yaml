description: S-SVOD list price by service (main movies & series, excl HVOD & sports), FX locked to 2025q4, averaged across countries
filters:
  quarter_label:
    choices: [Q1]
    default: [Q1]
  currency_code:
    label: Currency
    multiple: false
    choices: [EUR, SEK, NOK, DKK]
    default: [EUR]
sql: |
  WITH periods AS (
      SELECT n.year, n.quarter_label, n.period_label, n.period_sort
      FROM macro.dim_period n
      WHERE n.year::int >= 2022
        [[ AND {{quarter_label}} ]]
        [[ AND {{year}} ]]
  ),
  base AS (
      SELECT
          fp.country, fp.service_id,
          COALESCE(s.canonical_name, fp.service_id) AS service,
          fp.value, p.period_label, p.period_sort,
          fx.rate_to_eur AS rate_country,
          CASE fp.service_id
              WHEN 'apple_tv' THEN 1 WHEN 'discovery' THEN 2 WHEN 'hayu' THEN 3
              WHEN 'hbo_max' THEN 4 WHEN 'prime' THEN 5 WHEN 'tv4_play' THEN 6
              WHEN 'viaplay' THEN 7 WHEN 'youtube' THEN 8 WHEN 'disney' THEN 9
              WHEN 'skyshowtime' THEN 10 ELSE 999
          END AS service_sort
      FROM macro.fact_prices fp
      JOIN periods p ON fp.year = p.year::int AND UPPER(fp.quarter) = p.quarter_label
      LEFT JOIN macro.dim_service s ON fp.service_id = s.service_id
      JOIN macro.fact_fx_rate_quarterly fx
        ON fx.period_key = '2025q4'
       AND fx.currency_code = CASE fp.country
              WHEN 'se' THEN 'SEK' WHEN 'no' THEN 'NOK'
              WHEN 'dk' THEN 'DKK' WHEN 'fi' THEN 'EUR'
           END
      WHERE fp.service_id IN (
              'apple_tv','discovery','hayu','hbo_max','prime',
              'tv4_play','viaplay','youtube','disney','skyshowtime')
        AND fp.analysis = 'streaming'
        AND fp.kpi_type = 'list_price'
        AND fp.kpi_id = 'ssvod_price'
        AND fp.period_type = 'month'
        AND fp.is_main_movies = TRUE
        AND fp.hvod = FALSE
        AND fp.sports = FALSE
  ),
  target_fx AS (
      SELECT rate_to_eur
      FROM macro.fact_fx_rate_quarterly
      WHERE period_key = '2025q4'
        [[ AND {{currency_code}} ]]
  ),
  per_country AS (
      SELECT country, service, service_sort, period_label, period_sort,
             MAX(value * rate_country / tf.rate_to_eur) AS value_country
      FROM base
      CROSS JOIN target_fx tf
      WHERE tf.rate_to_eur IS NOT NULL
      GROUP BY country, service, service_sort, period_label, period_sort, tf.rate_to_eur
  )
  SELECT
      service,
      period_label,
      period_sort,
      service_sort,
      AVG(value_country) AS value
  FROM per_country
  GROUP BY service, period_label, period_sort, service_sort
  ORDER BY service_sort, period_sort

plots:
  - id: ssvod_price_by_service
    title: "S-SVOD list price by service"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          value: +d.value,
          period_sort: +d.period_sort,
          service_sort: +d.service_sort
        });
      });

      var periods = Array.from(new Set(
        rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort; }).map(function(d) { return d.period_label; })
      ));

      var services = Array.from(new Set(
        rows.slice().sort(function(a, b) { return a.service_sort - b.service_sort; }).map(function(d) { return d.service; })
      ));

      var greens = ["#c7e8c7", "#8dc88d", "#52a852", "#1a6640"];
      var colorRange = periods.map(function(_, i) {
        return greens[Math.round(i * (greens.length - 1) / Math.max(periods.length - 1, 1))];
      });

      return Plot.plot({
        width: Math.max(900, services.length * 100),
        height: 420,
        fx: { label: null, domain: services, padding: 0.15 },
        x: { label: null, domain: periods, axis: null },
        y: { label: null, grid: true },
        color: {
          legend: true,
          domain: periods,
          range: colorRange
        },
        marks: [
          Plot.barY(rows, {
            fx: "service",
            x: "period_label",
            y: "value",
            fill: "period_label"
          }),
          Plot.text(rows, {
            fx: "service",
            x: "period_label",
            y: "value",
            text: function(d) { return Math.round(d.value); },
            fontSize: 11,
            fontWeight: "bold",
            dy: -8
          }),
          Plot.ruleY([0])
        ],
        marginTop: 30,
        marginBottom: 80,
        marginLeft: 40,
        marginRight: 30
      });
