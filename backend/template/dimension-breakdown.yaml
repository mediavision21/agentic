description: online video reach breakdown by dimension in a single country (Norway)
sql: |
  SELECT
    period_sort,
    period_label,
    kpi_dimension AS dimension,
    SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value
  FROM macro.nordic
  WHERE kpi_type      = 'reach'
    AND category      = 'online_video'
    AND kpi_dimension IS NOT NULL
    AND country       = 'norway'
    AND age_group     = '15-74'
    AND year          > 2020
    AND quarter       IN (1, 3)
  GROUP BY period_sort, period_label, kpi_dimension
  ORDER BY period_sort
plots:
  - id: dimension_trend
    title: "Reach by dimension over time — Norway"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort }) });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) { if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label) } });
      return Plot.plot({
        width: Math.max(800, periods.length * 50),
        marks: [
          Plot.line(rows, { x: "period_label", y: "value", stroke: "dimension", curve: "catmull-rom", tip: true })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Reach %", grid: true },
        color: { legend: true },
        marginRight: 180,
        marginBottom: 80
      })

  - id: dimension_latest
    title: "Reach by dimension — latest period"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort }) });
      var maxSort = Math.max.apply(null, rows.map(function(d) { return d.period_sort }));
      var latest = rows.filter(function(d) { return d.period_sort === maxSort }).sort(function(a, b) { return b.value - a.value });
      var periodLabel = latest.length > 0 ? latest[0].period_label : "";
      return Plot.plot({
        title: periodLabel,
        marks: [
          Plot.barX(latest, { x: "value", y: "dimension", fill: "dimension", sort: { y: "-x" }, tip: true }),
          Plot.text(latest, { x: "value", y: "dimension", text: function(d) { return d.value.toFixed(1) + "%" }, dx: 4, textAnchor: "start", fontSize: 11 }),
          Plot.ruleX([0])
        ],
        x: { label: "Reach %", grid: true },
        y: { label: null },
        color: { legend: false },
        marginLeft: 160,
        marginRight: 80
      })
