description: compare Netflix, Disney+ and HBO Max weekly reach in Norway
sql: |
  SELECT
    period_sort,
    period_label,
    canonical_name AS service,
    SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value
  FROM macro.nordic
  WHERE kpi_type      = 'reach_service_weekly'
    AND category      = 'online_video'
    AND canonical_name IN ('Netflix', 'Disney+', 'HBO Max')
    AND country       = 'sweden'
    AND age_group     = '15-74'
    AND year          > 2020
  GROUP BY period_sort, period_label, canonical_name
  ORDER BY period_sort
plots:
  - id: service_compare_trend
    title: "Netflix vs Disney+ vs HBO Max — Norway"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort }) });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) { if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label) } });
      return Plot.plot({
        width: Math.max(800, periods.length * 50),
        marks: [
          Plot.line(rows, { x: "period_label", y: "value", stroke: "service", curve: "catmull-rom", tip: true }),
          Plot.dot(rows, { x: "period_label", y: "value", fill: "service", r: 3 })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Weekly reach %", grid: true },
        color: { legend: true },
        marginRight: 120,
        marginBottom: 80
      })
