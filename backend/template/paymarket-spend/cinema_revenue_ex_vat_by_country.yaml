description: Total cinema ticket revenue ex VAT by country, FX locked to 2025q4
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
  currency_code:
    label: Currency
    multiple: false
    choices:
    - EUR
    - SEK
    - NOK
    - DKK
    default:
    - EUR
sql: "WITH spend AS (\n    SELECT n.country, n.period_date,\n           n.value AS\
  \ spend_users, n.population_household\n    FROM macro.nordic n\n    WHERE n.category\
  \ = 'cinema'\n      AND n.kpi_type = 'spend'\n      AND n.population_segment = 'users'\n\
  \      AND n.age_group = '15-74'\n      AND n.value IS NOT NULL\n      AND n.canonical_name\
  \ IS NULL\n      AND n.period_date >= '2022-01-01'\n      [[ AND {{country}} ]]\n\
  \      [[ AND {{year}} ]]\n      [[ AND {{quarter_label}} ]]\n),\nreach AS (\n \
  \   SELECT n.country, n.period_date, n.value AS reach_monthly\n    FROM macro.nordic\
  \ n\n    WHERE n.category = 'cinema'\n      AND n.kpi_type = 'reach_monthly'\n \
  \     AND n.age_group = '15-74'\n      AND n.value IS NOT NULL\n      AND n.canonical_name\
  \ IS NULL\n),\ntarget_fx AS (\n    SELECT rate_to_eur\n    FROM macro.fact_fx_rate_quarterly\n\
  \    WHERE period_key = '2025q4'\n      [[ AND {{currency_code}} ]]\n)\nSELECT\n\
  \    s.period_date,\n    INITCAP(s.country) AS country,\n    (s.spend_users * r.reach_monthly\
  \ * s.population_household * 3\n      * fx.rate_to_eur / tf.rate_to_eur\n      /\
  \ (1.0 + CASE s.country\n          WHEN 'sweden' THEN 0.25\n          WHEN 'norway'\
  \ THEN 0.25\n          WHEN 'denmark' THEN 0.25\n          WHEN 'finland' THEN 0.255\n\
  \      END)\n      * 1000) AS revenue\nFROM spend s\nJOIN reach r\n  ON s.country\
  \ = r.country\n AND s.period_date = r.period_date\nJOIN macro.fact_fx_rate_quarterly\
  \ fx\n  ON fx.period_key = '2025q4'\n AND fx.currency_code = CASE s.country\n  \
  \      WHEN 'sweden' THEN 'SEK'\n        WHEN 'norway' THEN 'NOK'\n        WHEN\
  \ 'denmark' THEN 'DKK'\n        WHEN 'finland' THEN 'EUR'\n     END\nCROSS JOIN\
  \ target_fx tf\nWHERE tf.rate_to_eur IS NOT NULL\n  AND r.reach_monthly >= 0\nORDER\
  \ BY s.period_date, s.country\n"
plots:
- id: cinema_revenue_ex_vat_by_country
  title: Total cinema ticket revenue ex VAT, by country
  config: |-
    {
        "marks": [
            {
                "type": "areaY",
                "x": "period_label",
                "y": "revenue",
                "fill": "country",
                "z": "country",
                "stack": true,
                "curve": "catmull-rom",
                "order": [
                    "Sweden",
                    "Norway",
                    "Finland",
                    "Denmark"
                ]
            },
            {
                "type": "lineY",
                "x": "period_label",
                "y": "revenue",
                "stroke": "country",
                "z": "country",
                "stack": true,
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "revenue",
                "stroke": "country",
                "fill": "white",
                "z": "country",
                "stack": true
            }
        ],
        "x": {
            "label": null,
            "tickRotate": -45
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "Sweden",
                "Norway",
                "Finland",
                "Denmark"
            ],
            "range": [
                "#e8a838",
                "#7aafc4",
                "#52b788",
                "#e07a5f"
            ]
        }
    }
