description: Media wallet — average monthly household video spend by category (SSVOD,
  Pay TV, Cinema, DVD/Blu-ray, TVOD), FX locked to 2025q4
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
  currency_code:
    label: Currency
    multiple: false
    choices:
    - EUR
    - SEK
    - NOK
    - DKK
    default:
    - EUR
sql: "WITH spend_data AS (\n    SELECT\n        n.country, n.period_date,\n      \
  \  n.category, n.kpi_dimension, n.value AS spend, n.population_household\n    FROM\
  \ macro.nordic n\n    WHERE n.kpi_type = 'spend'\n      AND n.age_group = '15-74'\n\
  \      AND n.value IS NOT NULL\n      AND (\n        (n.category = 'online_video'\
  \ AND n.kpi_dimension = 'ssvod' AND n.population_segment = 'subscribers')\n    \
  \    OR (n.category = 'tv' AND n.population_segment = 'subscribers')\n        OR\
  \ (n.category IN ('cinema', 'dvd_blu_ray', 'tvod') AND n.population_segment = 'users')\n\
  \      )\n      AND n.period_date >= '2020-01-01'\n      [[ AND {{country}} ]]\n\
  \      [[ AND {{year}} ]]\n      [[ AND {{quarter_label}} ]]\n),\npenetration_data\
  \ AS (\n    SELECT n.country, n.period_date, n.category, n.kpi_dimension, n.value\
  \ AS penetration\n    FROM macro.nordic n\n    WHERE n.age_group = '15-74'\n   \
  \   AND n.value IS NOT NULL\n      AND (\n        (n.category = 'online_video' AND\
  \ n.kpi_type = 'penetration' AND n.kpi_dimension = 'ssvod')\n        OR (n.category\
  \ = 'tv' AND n.kpi_type = 'penetration' AND n.kpi_dimension = 'pay_tv_channel')\n\
  \        OR (n.category IN ('cinema', 'dvd_blu_ray', 'tvod') AND n.kpi_type = 'reach_monthly')\n\
  \      )\n),\ncombined AS (\n    SELECT\n        s.period_date,\n        s.country,\n\
  \        CASE\n            WHEN s.category = 'online_video' AND s.kpi_dimension\
  \ = 'ssvod' THEN 'SSVOD'\n            WHEN s.category = 'tv' THEN 'Pay TV'\n   \
  \         WHEN s.category = 'cinema' THEN 'Cinema'\n            WHEN s.category\
  \ = 'dvd_blu_ray' THEN 'DVD/Blu-ray'\n            WHEN s.category = 'tvod' THEN\
  \ 'TVOD'\n        END AS business_model,\n        s.spend,\n        p.penetration,\n\
  \        s.population_household,\n        fx.rate_to_eur AS rate_country\n    FROM\
  \ spend_data s\n    JOIN penetration_data p\n      ON s.country = p.country\n  \
  \   AND s.period_date = p.period_date\n     AND s.category = p.category\n     AND\
  \ (\n         (s.category = 'online_video' AND s.kpi_dimension = p.kpi_dimension)\n\
  \         OR (s.category = 'tv')\n         OR (s.category IN ('cinema', 'dvd_blu_ray',\
  \ 'tvod'))\n     )\n    JOIN macro.fact_fx_rate_quarterly fx\n      ON fx.period_key\
  \ = '2025q4'\n     AND fx.currency_code = CASE s.country\n            WHEN 'sweden'\
  \ THEN 'SEK'\n            WHEN 'norway' THEN 'NOK'\n            WHEN 'denmark' THEN\
  \ 'DKK'\n            WHEN 'finland' THEN 'EUR'\n         END\n    WHERE p.penetration\
  \ >= 0\n),\ntarget_fx AS (\n    SELECT rate_to_eur\n    FROM macro.fact_fx_rate_quarterly\n\
  \    WHERE period_key = '2025q4'\n      [[ AND {{currency_code}} ]]\n)\nSELECT\n\
  \    c.period_date,\n    c.business_model,\n    SUM(\n        (c.spend * c.rate_country\
  \ / tf.rate_to_eur)\n        * c.penetration\n        * c.population_household\n\
  \    ) / NULLIF(SUM(c.population_household), 0) AS spend_population\nFROM combined\
  \ c\nCROSS JOIN target_fx tf\nWHERE tf.rate_to_eur IS NOT NULL\nGROUP BY c.period_date,\
  \ c.business_model\nORDER BY\n    c.period_date,\n    CASE c.business_model\n  \
  \      WHEN 'SSVOD' THEN 1\n        WHEN 'Pay TV' THEN 2\n        WHEN 'Cinema'\
  \ THEN 3\n        WHEN 'DVD/Blu-ray' THEN 4\n        WHEN 'TVOD' THEN 5\n    END\n"
plots:
- id: media_wallet_video_spend
  title: 'Media wallet: average monthly household video spend'
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "spend_population",
                "stroke": "business_model",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "spend_population",
                "fill": "white",
                "stroke": "business_model"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "SSVOD",
                "Pay TV",
                "Cinema",
                "DVD/Blu-ray",
                "TVOD"
            ],
            "range": [
                "#52b788",
                "#2b2a29",
                "#e07a5f",
                "#7aafc4",
                "#e8a838"
            ]
        }
    }
