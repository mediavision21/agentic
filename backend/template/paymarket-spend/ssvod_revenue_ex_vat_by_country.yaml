description: Total S-SVOD subscription revenue ex VAT by country, FX locked to 2025q4
filters:
  quarter_label:
    choices: [Q1]
    default: [Q1]
  currency_code:
    label: Currency
    multiple: false
    choices: [EUR, SEK, NOK, DKK]
    default: [EUR]
sql: |
  WITH spend AS (
      SELECT n.country, n.period_date,
             n.value AS spend_ssvod, n.population_household
      FROM macro.nordic n
      WHERE n.category = 'online_video'
        AND n.kpi_type = 'spend'
        AND n.kpi_dimension = 'ssvod'
        AND n.population_segment = 'subscribers'
        AND n.age_group = '15-74'
        AND n.value IS NOT NULL
        AND n.canonical_name IS NULL
        AND n.period_date >= '2022-01-01'
        [[ AND {{country}} ]]
        [[ AND {{year}} ]]
        [[ AND {{quarter_label}} ]]
  ),
  penetration AS (
      SELECT n.country, n.period_date, n.value AS penetration_ssvod
      FROM macro.nordic n
      WHERE n.category = 'online_video'
        AND n.kpi_type = 'penetration'
        AND n.kpi_dimension = 'ssvod'
        AND n.age_group = '15-74'
        AND n.value IS NOT NULL
        AND n.canonical_name IS NULL
  ),
  target_fx AS (
      SELECT rate_to_eur
      FROM macro.fact_fx_rate_quarterly
      WHERE period_key = '2025q4'
        [[ AND {{currency_code}} ]]
  )
  SELECT
      s.period_date,
      INITCAP(s.country) AS country,
      (s.spend_ssvod * fx.rate_to_eur / tf.rate_to_eur)
        * p.penetration_ssvod
        * s.population_household
        * 3
        / (1.0 + CASE s.country
            WHEN 'sweden' THEN 0.25
            WHEN 'norway' THEN 0.25
            WHEN 'denmark' THEN 0.25
            WHEN 'finland' THEN 0.255
        END)
        * 1000 AS revenue
  FROM spend s
  JOIN penetration p
    ON s.country = p.country
   AND s.period_date = p.period_date
  JOIN macro.fact_fx_rate_quarterly fx
    ON fx.period_key = '2025q4'
   AND fx.currency_code = CASE s.country
          WHEN 'sweden' THEN 'SEK'
          WHEN 'norway' THEN 'NOK'
          WHEN 'denmark' THEN 'DKK'
          WHEN 'finland' THEN 'EUR'
       END
  CROSS JOIN target_fx tf
  WHERE tf.rate_to_eur IS NOT NULL
    AND p.penetration_ssvod >= 0
  ORDER BY s.period_date, s.country

plots:
  - id: ssvod_revenue_ex_vat_by_country
    title: "Total S-SVOD subscription revenue ex VAT, by country"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          value: +d.revenue,
          period_label: fmtPeriod(d.period_date)
        });
      });

      var periods = Array.from(new Set(
        rows.slice().sort(function(a, b) { return a.period_date < b.period_date ? -1 : 1; }).map(function(d) { return d.period_label; })
      ));

      var countryOrder = ["Sweden", "Norway", "Finland", "Denmark"];
      var countryColors = ["#e8a838", "#7aafc4", "#52b788", "#e07a5f"];

      var totals = {};
      rows.forEach(function(d) {
        if (totals[d.period_label] == undefined) {
          totals[d.period_label] = 0;
        }
        totals[d.period_label] += d.value;
      });
      var totalRows = periods.map(function(p) {
        return { period_label: p, total: totals[p] };
      });

      return Plot.plot({
        width: Math.max(700, periods.length * 120),
        height: 420,
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: null, grid: true },
        color: {
          legend: true,
          domain: countryOrder,
          range: countryColors
        },
        marks: [
          Plot.areaY(rows, Plot.stackY({
            x: "period_label",
            y: "value",
            z: "country",
            fill: "country",
            order: countryOrder,
            curve: "catmull-rom"
          })),
          Plot.lineY(rows, Plot.stackY({
            x: "period_label",
            y: "value",
            z: "country",
            stroke: "country",
            order: countryOrder,
            curve: "catmull-rom",
            strokeWidth: 1.5
          })),
          Plot.dot(rows, Plot.stackY({
            x: "period_label",
            y: "value",
            z: "country",
            fill: "white",
            stroke: "country",
            order: countryOrder,
            r: 4,
            strokeWidth: 2
          })),
          Plot.text(totalRows, {
            x: "period_label",
            y: "total",
            text: function(d) {
              return (d.total / 1e6).toFixed(1) + "M";
            },
            fontSize: 12,
            fontWeight: "bold",
            fill: "#e07a5f",
            dy: -14
          }),
          Plot.ruleY([0])
        ],
        marginTop: 40,
        marginBottom: 80,
        marginLeft: 60,
        marginRight: 30
      });
