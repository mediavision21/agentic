description: daily reach online video per service
sql: |
  SELECT
    period_sort,
    period_label,
    canonical_name,
    SUM(value * population) / NULLIF(SUM(population), 0) AS reach
  FROM macro.nordic
  WHERE category    = 'online_video'
    AND kpi_type        = 'reach'
    AND kpi_dimension   IS NULL
    AND age_group         = '15-74'
    AND population_segment     IS NULL
    AND canonical_name     IS NOT NULL
    AND year        > 2020
    AND quarter     IN (1, 3)
  GROUP BY period_sort, period_label, canonical_name
  ORDER BY period_sort, canonical_name

plots:
  - id: reach_time_series
    title: "Daily reach by service over time (top 10)"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { reach: +d.reach * 100, period_sort: +d.period_sort }) });
      var maxSort = Math.max.apply(null, rows.map(function(d) { return d.period_sort }));
      var top10 = rows.filter(function(d) { return d.period_sort === maxSort }).sort(function(a, b) { return b.reach - a.reach }).slice(0, 10).map(function(d) { return d.canonical_name });
      rows = rows.filter(function(d) { return top10.indexOf(d.canonical_name) >= 0 });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) { if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label) } });
      return Plot.plot({
        width: Math.max(800, periods.length * 50),
        marks: [
          Plot.line(rows, { x: "period_label", y: "reach", stroke: "canonical_name", curve: "catmull-rom", tip: true }),
          Plot.dot(rows, { x: "period_label", y: "reach", fill: "canonical_name", r: 2 })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Daily reach %", grid: true },
        color: { legend: true },
        marginRight: 180,
        marginBottom: 80
      })

  - id: reach_latest_bar
    title: "Daily reach — latest period"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { reach: +d.reach * 100, period_sort: +d.period_sort }) });
      var maxSort = Math.max.apply(null, rows.map(function(d) { return d.period_sort }));
      var latest = rows.filter(function(d) { return d.period_sort === maxSort }).sort(function(a, b) { return b.reach - a.reach }).slice(0, 15);
      var periodLabel = latest.length > 0 ? latest[0].period_label : "";
      return Plot.plot({
        title: periodLabel,
        marks: [
          Plot.barX(latest, { x: "reach", y: "canonical_name", fill: "canonical_name", sort: { y: "-x" }, tip: true }),
          Plot.text(latest, { x: "reach", y: "canonical_name", text: function(d) { return d.reach.toFixed(1) + "%" }, dx: 4, textAnchor: "start", fontSize: 11 }),
          Plot.ruleX([0])
        ],
        x: { label: "Daily reach %", grid: true },
        y: { label: null },
        color: { legend: false },
        marginLeft: 160,
        marginRight: 60
      })

  - id: reach_heatmap
    title: "Reach heatmap — service x period (top 15)"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { reach: +d.reach * 100, period_sort: +d.period_sort }) });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) { if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label) } });
      var maxSort = Math.max.apply(null, rows.map(function(d) { return d.period_sort }));
      var top15 = rows.filter(function(d) { return d.period_sort === maxSort }).sort(function(a, b) { return b.reach - a.reach }).slice(0, 15).map(function(d) { return d.canonical_name });
      rows = rows.filter(function(d) { return top15.indexOf(d.canonical_name) >= 0 });
      return Plot.plot({
        marks: [
          Plot.cell(rows, { x: "period_label", y: "canonical_name", fill: "reach", tip: true }),
          Plot.text(rows, { x: "period_label", y: "canonical_name", text: function(d) { return d.reach.toFixed(0) + "%" }, fontSize: 9, fill: "black" })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: null, domain: top15 },
        color: { scheme: "YlOrRd", legend: true, label: "Reach %" },
        marginLeft: 160,
        marginBottom: 80
      })