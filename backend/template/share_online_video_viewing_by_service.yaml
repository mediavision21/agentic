category: Viewing - overview
description: Share of online video viewing time by service — population-weighted Nordic average, top 10 + Others, stacked bars with boundary lines
sql: |
  WITH base AS (
    SELECT
      vt.period_sort,
      vt.period_label,
      vt.year,
      vt.quarter_label,
      vt.country,
      vt.canonical_name AS service,
      vt.value * r.value AS viewing_time_per_individual,
      vt.population
    FROM macro.nordic vt
    JOIN macro.nordic r
      ON  vt.country        = r.country
      AND vt.year           = r.year
      AND vt.quarter        = r.quarter
      AND vt.canonical_name = r.canonical_name
    WHERE
      vt.category            = 'online_video'
      AND vt.kpi_type        = 'viewing_time'
      AND vt.population_segment = 'viewers'
      AND vt.kpi_dimension   IS NULL
      AND vt.age_group       = '15-74'
      AND vt.canonical_name  IS NOT NULL
      AND r.category         = 'online_video'
      AND r.kpi_type         = 'reach'
      AND r.population_segment IS NULL
      AND r.kpi_dimension    IS NULL
      AND r.age_group        = '15-74'
      AND r.canonical_name IN (
        SELECT canonical_name FROM macro.dim_service
        WHERE is_streaming_service OR is_avod OR is_fast OR is_public_service
      )
      AND vt.period_sort     >= 20243
      AND vt.quarter         IN (1, 3)
  ),
  service_time_country AS (
    SELECT
      period_sort, period_label, year, quarter_label, country, service,
      SUM(viewing_time_per_individual) AS vt_individual,
      MAX(population)                  AS population
    FROM base
    GROUP BY period_sort, period_label, year, quarter_label, country, service
  ),
  shares_within_country AS (
    SELECT
      period_sort, period_label, year, quarter_label, country, service,
      vt_individual / NULLIF(SUM(vt_individual) OVER (PARTITION BY period_sort, country), 0) AS share_in_country,
      population
    FROM service_time_country
  ),
  country_weights AS (
    SELECT
      period_sort, country,
      population / NULLIF(SUM(population) OVER (PARTITION BY period_sort), 0) AS country_weight
    FROM (SELECT DISTINCT period_sort, country, population FROM shares_within_country) x
  ),
  shares_weighted AS (
    SELECT
      s.period_sort, s.period_label, s.year, s.quarter_label, s.service,
      SUM(s.share_in_country * w.country_weight) AS share_of_total
    FROM shares_within_country s
    JOIN country_weights w ON s.period_sort = w.period_sort AND s.country = w.country
    GROUP BY s.period_sort, s.period_label, s.year, s.quarter_label, s.service
  ),
  latest_quarter AS (
    SELECT MAX(period_sort) AS max_period_sort FROM shares_weighted
  ),
  service_order AS (
    SELECT service,
           ROW_NUMBER() OVER (ORDER BY share_of_total DESC) AS global_rank
    FROM shares_weighted
    WHERE period_sort = (SELECT max_period_sort FROM latest_quarter)
      AND share_of_total > 0
  ),
  labeled AS (
    SELECT
      f.period_sort, f.period_label, f.year, f.quarter_label,
      CASE WHEN o.global_rank <= 10 THEN f.service ELSE 'Others' END AS service,
      CASE WHEN o.global_rank > 10  THEN 0 ELSE 11 - o.global_rank  END AS stack_order,
      f.share_of_total
    FROM shares_weighted f
    JOIN service_order o ON f.service = o.service
  )
  SELECT
    period_sort, period_label, year, quarter_label, service,
    stack_order,
    SUM(share_of_total) * 100 AS share_of_total
  FROM labeled
  GROUP BY period_sort, period_label, year, quarter_label, service, stack_order
  ORDER BY period_sort, stack_order

plots:
  - id: share_online_video_by_service
    title: "Share of online video viewing by service"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          share_of_total: +d.share_of_total,
          period_sort: +d.period_sort,
          stack_order: +d.stack_order
        });
      });

      // Two most recent periods (same quarter, one year apart)
      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_sort; })))
        .sort(function(a, b) { return b - a });
      var latest = sortedPeriods[0];
      var yearAgo = sortedPeriods.find(function(s) {
        return Math.floor(s / 10) === Math.floor(latest / 10) - 1 &&
               (s % 10) === (latest % 10);
      }) || sortedPeriods[1];

      var subset = rows.filter(function(d) {
        return d.period_sort === latest || d.period_sort === yearAgo;
      });

      var latestLabel  = (rows.find(function(d) { return d.period_sort === latest;  }) || {}).period_label || "";
      var yearAgoLabel = (rows.find(function(d) { return d.period_sort === yearAgo; }) || {}).period_label || "";
      var periodOrder  = [yearAgoLabel, latestLabel];

      // Stack order from SQL:
      //   stack_order 1 = rank 10 (smallest of top 10) → near top of chart
      //   stack_order 10 = rank 1 (largest, e.g. Netflix) → bottom of chart
      //   stack_order 0 = Others → very top
      // We draw bottom-to-top: stack_order 10 first, then 9..1, then 0 (Others)
      var servicesMeta = [];
      var seenSvc = {};
      subset.forEach(function(d) {
        if (!seenSvc[d.service]) {
          seenSvc[d.service] = true;
          servicesMeta.push({ service: d.service, stack_order: d.stack_order });
        }
      });
      // Sort: 10 → 9 → ... → 1 → 0(Others at top)
      servicesMeta.sort(function(a, b) {
        var ao = a.stack_order === 0 ? -1 : a.stack_order;
        var bo = b.stack_order === 0 ? -1 : b.stack_order;
        return bo - ao; // descending: 10,9,...,1,0
      });
      var stackedServices = servicesMeta.map(function(s) { return s.service; });

      // Color palette matching screenshot aesthetics
      var colorPalette = {
        "Netflix":         "#1a5c38",
        "Youtube":         "#52b788",
        "Disney+":         "#95d5b2",
        "HBO Max":         "#1b6b8a",
        "Viaplay":         "#a8d8ea",
        "Prime Video":     "#888888",
        "TV4 Play (SE)":   "#f4b8c8",
        "SVT Play (SE)":   "#e8a0bf",
        "Yle Areena (FI)": "#c075a0",
        "TV2 Play (NO)":   "#6b2080",
        "Others":          "#c8d8c8"
      };
      var fallbackColors = ["#74c2a8","#5b8db8","#e8b84b","#d4765a","#9b59b6","#e67e22"];
      var colorAssigned = {};
      var fallbackIdx = 0;
      stackedServices.forEach(function(svc) {
        colorAssigned[svc] = colorPalette[svc] || fallbackColors[fallbackIdx++ % fallbackColors.length];
      });

      // Compute stacked y1/y2 per period, drawing bottom-to-top in stackedServices order
      var stackPos = {};
      periodOrder.forEach(function(period) {
        stackPos[period] = {};
        var cum = 0;
        stackedServices.forEach(function(svc) {
          var row = subset.find(function(d) { return d.period_label === period && d.service === svc; });
          var v = row ? row.share_of_total : 0;
          stackPos[period][svc] = { y1: cum, y2: cum + v, value: v };
          cum += v;
        });
      });

      // Band rectangles
      var bandData = [];
      stackedServices.forEach(function(svc) {
        periodOrder.forEach(function(period) {
          var pos = stackPos[period][svc];
          bandData.push({ period_label: period, service: svc, y1: pos.y1, y2: pos.y2 });
        });
      });

      // Lines + dots: drawn at the TOP boundary of each band.
      // This means the line for Netflix sits at the top of the Netflix band (= bottom of Youtube band),
      // which visually appears as the dividing line between segments — matching the screenshot.
      var lineFlatTop = [];
      stackedServices.forEach(function(svc) {
        periodOrder.forEach(function(period) {
          lineFlatTop.push({ period_label: period, service: svc, y: stackPos[period][svc].y2 });
        });
      });

      // Legend order: top of stack first (Others → ... → Netflix)
      var legendServices = stackedServices.slice(); // already Others-last; reverse for legend top-first
      legendServices = legendServices.slice().reverse();

      var chart = Plot.plot({
        width: 380,
        height: 500,
        marginLeft: 50,
        marginRight: 20,
        marginTop: 20,
        marginBottom: 50,
        x: { label: null, domain: periodOrder, padding: 0.4 },
        y: {
          label: null,
          grid: true,
          domain: [0, 100],
          ticks: 5,
          tickFormat: function(v) { return v + "%"; }
        },
        marks: [
          // Filled stacked bands
          Plot.areaY(bandData, {
            x: "period_label",
            y1: "y1",
            y2: "y2",
            fill: function(d) { return colorAssigned[d.service]; },
            tip: true,
            title: function(d) { return d.service + ": " + (d.y2 - d.y1).toFixed(1) + "%"; }
          }),
          // Boundary lines at top of each band
          Plot.line(lineFlatTop, {
            x: "period_label",
            y: "y",
            stroke: function(d) { return colorAssigned[d.service]; },
            z: "service",
            strokeWidth: 1.8
          }),
          // Hollow circle endpoints
          Plot.dot(lineFlatTop, {
            x: "period_label",
            y: "y",
            fill: "white",
            stroke: function(d) { return colorAssigned[d.service]; },
            strokeWidth: 1.8,
            r: 4
          }),
          Plot.ruleY([0])
        ]
      });

      // Right-side legend
      var legendHtml = legendServices.map(function(svc) {
        return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12px;white-space:nowrap;">'
          + '<svg width="12" height="12" style="flex-shrink:0"><circle cx="6" cy="6" r="5" fill="'
          + colorAssigned[svc] + '"/></svg>'
          + '<span>' + svc + '</span></div>';
      }).join('');

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:flex;align-items:flex-start;gap:16px;font-family:sans-serif;';

      var legendEl = document.createElement('div');
      legendEl.style.cssText = 'padding-top:28px;flex-shrink:0;';
      legendEl.innerHTML = legendHtml;

      wrapper.appendChild(chart);
      wrapper.appendChild(legendEl);
      return wrapper;
