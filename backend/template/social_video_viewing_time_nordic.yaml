description: Daily viewing time of social video (minutes/day) across Nordic countries,
  population-weighted average
sql: "SELECT\n    n.period_date,\n    SUM(n.value * n.population) / NULLIF(SUM(n.population),\
  \ 0) AS viewing_time_minutes\nFROM macro.nordic n\nWHERE\n    n.category = 'online_video'\n\
  \    AND n.kpi_type = 'viewing_time'\n    AND n.kpi_dimension = 'social'\n    --\
  \ AND n.canonical_name IS NULL\n    AND n.age_group = '15-74'\n    AND EXTRACT(MONTH\
  \ FROM n.period_date) IN (1, 7)\n    [[ AND {{country}} ]]\n    [[ AND {{year}}\
  \ ]]\n    [[ AND {{quarter_label}} ]]\nGROUP BY\n    n.period_date\nORDER BY\n \
  \   n.period_date;\n"
plots:
- id: social_video_viewing_time_trend
  title: Daily viewing time of social video — trend
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "viewing_time_minutes",
                "stroke": "#1a5c38",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "viewing_time_minutes",
                "fill": "#1a5c38"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Minutes per day",
            "grid": true,
            "domain": [
                0,
                60
            ]
        }
    }
- id: social_video_viewing_time_compare
  title: Daily viewing time of social video — latest vs year-ago
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "viewing_time_minutes",
                "fill": "period_label"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Minutes per day",
            "grid": true,
            "domain": [
                0,
                60
            ]
        },
        "color": {
            "legend": true,
            "scheme": "greens"
        }
    }
