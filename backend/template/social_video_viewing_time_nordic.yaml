description: Daily viewing time of social video (minutes/day) across Nordic countries, population-weighted average
sql: |
  SELECT
      n.period_date,
      SUM(n.value * n.population) / NULLIF(SUM(n.population), 0) AS viewing_time_minutes
  FROM macro.nordic n
  WHERE
      n.category = 'online_video'
      AND n.kpi_type = 'viewing_time'
      AND n.kpi_dimension = 'social'
      -- AND n.canonical_name IS NULL
      AND n.age_group = '15-74'
      AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
      [[ AND {{country}} ]]
      [[ AND {{year}} ]]
      [[ AND {{quarter_label}} ]]
  GROUP BY
      n.period_date
  ORDER BY
      n.period_date;

plots:
  - id: social_video_viewing_time_trend
    title: "Daily viewing time of social video — trend"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          viewing_time_minutes: +d.viewing_time_minutes,
          period_label: fmtPeriod(d.period_date)
        });
      });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_date < b.period_date ? -1 : 1; }).forEach(function(d) {
        if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label); }
      });
      return Plot.plot({
        width: Math.max(800, periods.length * 60),
        marks: [
          Plot.line(rows, {
            x: "period_label",
            y: "viewing_time_minutes",
            stroke: "#1a5c38",
            curve: "catmull-rom",
            strokeWidth: 2.5,
            tip: true
          }),
          Plot.dot(rows, {
            x: "period_label",
            y: "viewing_time_minutes",
            fill: "#1a5c38",
            r: 4
          }),
          Plot.text(rows, {
            x: "period_label",
            y: "viewing_time_minutes",
            text: function(d) { return Math.round(d.viewing_time_minutes) + " min"; },
            dy: -12,
            fontSize: 11,
            fill: "#1a5c38"
          })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Minutes per day", grid: true, domain: [0, 60] },
        marginRight: 40,
        marginBottom: 80
      });

  - id: social_video_viewing_time_compare
    title: "Daily viewing time of social video — latest vs year-ago"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          viewing_time_minutes: +d.viewing_time_minutes,
          period_label: fmtPeriod(d.period_date)
        });
      });
      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_date; }))).sort();
      var latest = sortedPeriods[sortedPeriods.length - 1];
      var latestD = new Date(latest); var yearAgoD = new Date(latestD); yearAgoD.setUTCFullYear(yearAgoD.getUTCFullYear() - 1);
      var yearAgo = yearAgoD.toISOString().slice(0, 10);
      var subset = rows.filter(function(d) {
        return d.period_date === latest || d.period_date === yearAgo;
      });
      var latestLabel  = fmtPeriod(latest);
      var yearAgoLabel = fmtPeriod(yearAgo);
      return Plot.plot({
        width: 340,
        height: 320,
        x:  { label: null, domain: [yearAgoLabel, latestLabel] },
        y:  { label: "Minutes per day", grid: true, domain: [0, 60] },
        color: {
          legend: true,
          domain: [yearAgoLabel, latestLabel],
          range: ["#2d8653", "#1a5c38"]
        },
        marks: [
          Plot.barY(subset, {
            x: "period_label",
            y: "viewing_time_minutes",
            fill: "period_label",
            tip: true,
            insetLeft: 8,
            insetRight: 8
          }),
          Plot.text(subset, {
            x: "period_label",
            y: "viewing_time_minutes",
            text: function(d) { return Math.round(d.viewing_time_minutes) + " min"; },
            dy: -10,
            fontSize: 12,
            fill: "#333"
          }),
          Plot.ruleY([0])
        ],
        marginBottom: 40,
        marginTop: 30
      });
