description: Daily viewing minutes of video (Social video, Other online video, TV) — population-weighted Nordic average by age group
sql: |
  SELECT
      n.period_date,
      CASE
          WHEN n.category = 'tv'                          THEN 'TV'
          WHEN n.kpi_dimension = 'social'                 THEN 'Social video'
          WHEN n.kpi_dimension = 'online_excluding_social' THEN 'Other online video'
      END AS business_model,
      CASE
          WHEN n.kpi_dimension = 'social'                 THEN 1
          WHEN n.kpi_dimension = 'online_excluding_social' THEN 2
          WHEN n.category = 'tv'                          THEN 3
      END AS series_order,
      SUM(n.value * r.value * n.population_1574)
          / NULLIF(SUM(n.population_1574), 0) AS viewing_time_population
  FROM macro.nordic n
  JOIN macro.nordic r
    ON  n.country       = r.country
   AND n.period_date    = r.period_date
   AND n.kpi_dimension IS NOT DISTINCT FROM r.kpi_dimension
   AND n.age_group      = r.age_group
  WHERE
      n.category          IN ('online_video', 'tv')
    AND n.kpi_type        = 'viewing_time'
    AND (n.kpi_dimension IN ('social', 'online_excluding_social') OR n.category = 'tv')
    AND n.age_group       = '15-74'
    AND r.kpi_type         = 'reach'
    AND r.age_group        = '15-74'
    AND n.period_date    >= '2024-07-01'
    AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
    AND n.category        = r.category
    [[ AND {{country}} ]]
    [[ AND {{year}} ]]
    [[ AND {{quarter_label}} ]]
  GROUP BY n.period_date, n.category, n.kpi_dimension
  ORDER BY n.period_date, series_order

plots:
  - id: daily_viewing_minutes_video
    title: "Daily viewing minutes of video"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          value: +d.viewing_time_population,
          period_label: fmtPeriod(d.period_date)
        });
      });

      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_date; }))).sort();
      var latest = sortedPeriods[sortedPeriods.length - 1];
      var latestD = new Date(latest); var yearAgoD = new Date(latestD); yearAgoD.setUTCFullYear(yearAgoD.getUTCFullYear() - 1);
      var yearAgo = yearAgoD.toISOString().slice(0, 10);
      var subset = rows.filter(function(d) { return d.period_date === latest || d.period_date === yearAgo; });
      var latestLabel = fmtPeriod(latest);
      var yearAgoLabel = fmtPeriod(yearAgo);

      var categories = ["Social video", "Other online video", "TV"];
      var periodOrder = [yearAgoLabel, latestLabel];

      var barRows = [];
      categories.forEach(function(bm) {
        periodOrder.forEach(function(period) {
          var row = subset.find(function(d) { return d.period_label === period && d.business_model === bm; });
          barRows.push({ business_model: bm, period_label: period, value: row ? row.value : 0 });
        });
      });

      var maxY = Math.ceil(Math.max.apply(null, barRows.map(function(d) { return d.value; })) * 1.25 / 10) * 10;

      return Plot.plot({
        width: 700,
        height: 400,
        fx: { label: null, domain: categories, padding: 0.3 },
        x: { label: null, domain: periodOrder, axis: null },
        y: { label: "Minutes per day", grid: true, domain: [0, maxY] },
        color: {
          legend: true,
          domain: periodOrder,
          range: ["#1a5c38", "#2d8653"]
        },
        marks: [
          Plot.barY(barRows, {
            fx: "business_model",
            x: "period_label",
            y: "value",
            fill: "period_label",
            insetLeft: 2,
            insetRight: 2,
            tip: false
          }),
          Plot.text(barRows, {
            fx: "business_model",
            x: "period_label",
            y: "value",
            text: function(d) { return Math.round(d.value) + " min"; },
            fontSize: 13,
            fontWeight: "bold",
            fill: "#111",
            dy: -12
          }),
          Plot.ruleY([0])
        ],
        marginTop: 40,
        marginBottom: 50,
        marginLeft: 55,
        marginRight: 30
      });

  - id: daily_viewing_minutes_video_trend
    title: "Daily viewing minutes of video — trend"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          value: +d.viewing_time_population,
          period_label: fmtPeriod(d.period_date)
        });
      });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_date < b.period_date ? -1 : 1; }).forEach(function(d) {
        if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label); }
      });
      return Plot.plot({
        width: Math.max(700, periods.length * 60),
        marks: [
          Plot.line(rows, {
            x: "period_label",
            y: "value",
            stroke: "business_model",
            curve: "catmull-rom",
            strokeWidth: 2,
            tip: true
          }),
          Plot.dot(rows, {
            x: "period_label",
            y: "value",
            fill: "business_model",
            r: 4
          })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Minutes per day", grid: true },
        color: {
          legend: true,
          domain: ["Social video", "Other online video", "TV"],
          range: ["#95d5b2", "#1a5c38", "#52b788"]
        },
        marginRight: 160,
        marginBottom: 80
      });
