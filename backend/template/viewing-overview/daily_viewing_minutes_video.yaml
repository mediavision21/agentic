description: Daily viewing minutes of video (Social video, Other online video, TV)
  — population-weighted Nordic average by age group
sql: |-
    SELECT
        n.period_date,
        CASE
            WHEN n.category = 'tv'                          THEN 'TV'
            WHEN n.kpi_dimension = 'social'                 THEN 'Social video'
            WHEN n.kpi_dimension = 'online_excluding_social' THEN 'Other online video'
        END AS business_model,
        CASE
            WHEN n.kpi_dimension = 'social'                 THEN 1
            WHEN n.kpi_dimension = 'online_excluding_social' THEN 2
            WHEN n.category = 'tv'                          THEN 3
        END AS series_order,
        SUM(n.value * r.value * n.population_1574)
            / NULLIF(SUM(n.population_1574), 0) AS viewing_time_population
    FROM macro.nordic n
    JOIN macro.nordic r
      ON  n.country       = r.country
     AND n.period_date    = r.period_date
     AND n.kpi_dimension IS NOT DISTINCT FROM r.kpi_dimension
     AND n.age_group      = r.age_group
    WHERE
        n.category          IN ('online_video', 'tv')
      AND n.kpi_type        = 'viewing_time'
      AND (n.kpi_dimension IN ('social', 'online_excluding_social') OR n.category = 'tv')
      AND n.age_group       = '15-74'
      AND r.kpi_type         = 'reach'
      AND r.age_group        = '15-74'
      AND n.period_date    >= '2024-07-01'
      AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
      AND n.category        = r.category
      [[ AND {{country}} ]]
      [[ AND {{year}} ]]
      [[ AND {{quarter_label}} ]]
    GROUP BY n.period_date, n.category, n.kpi_dimension
    ORDER BY n.period_date, series_order
plots:
- id: daily_viewing_minutes_video
  title: Daily viewing minutes of video
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "viewing_time_population",
                "fill": "period_label",
                "fx": "business_model"
            }
        ],
        "fx": {
            "label": null,
            "domain": [
                "Social video",
                "Other online video",
                "TV"
            ],
            "padding": 0.3
        },
        "x": {
            "label": null,
            "axis": null
        },
        "y": {
            "label": "Minutes per day",
            "grid": true
        },
        "color": {
            "legend": true,
            "scheme": "greens"
        }
    }
- id: daily_viewing_minutes_video_trend
  title: Daily viewing minutes of video — trend
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "viewing_time_population",
                "stroke": "business_model",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "viewing_time_population",
                "fill": "white",
                "stroke": "business_model"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Minutes per day",
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "Social video",
                "Other online video",
                "TV"
            ],
            "range": [
                "#95d5b2",
                "#1a5c38",
                "#52b788"
            ]
        }
    }
