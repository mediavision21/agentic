description: Daily viewing minutes of online video (Social video + Other online video) — population-weighted Nordic average
sql: |
  SELECT
    vt.period_sort,
    vt.period_label,
    CASE vt.kpi_dimension
      WHEN 'social'                  THEN 'Social video'
      WHEN 'online_excluding_social' THEN 'Other online video'
    END AS business_model,
    CASE vt.kpi_dimension
      WHEN 'social'                  THEN 1
      WHEN 'online_excluding_social' THEN 2
    END AS series_order,
    -- viewing_time_population = reach × viewing_time_viewers, weighted by population
    SUM(vt.value * r.value * vt.population_1574)
        / NULLIF(SUM(vt.population_1574), 0) AS viewing_time_population
  FROM macro.nordic vt
  JOIN macro.nordic r
    ON  vt.country       = r.country
    AND vt.year          = r.year
    AND vt.quarter       = r.quarter
    AND vt.kpi_dimension = r.kpi_dimension
  WHERE
    vt.category           = 'online_video'
    AND vt.kpi_type       = 'viewing_time'
    AND vt.kpi_dimension  IN ('social', 'online_excluding_social')
    AND vt.canonical_name IS NULL
    AND vt.age_group      = '15-74'
    AND r.category        = 'online_video'
    AND r.kpi_type        = 'reach'
    AND r.canonical_name  IS NULL
    AND r.age_group       = '15-74'
    AND vt.period_sort   >= 20243
    AND vt.quarter        IN (1, 3)
  GROUP BY vt.period_sort, vt.period_label, vt.kpi_dimension
  ORDER BY vt.period_sort, series_order

plots:
  - id: daily_viewing_minutes_stacked
    title: "Daily viewing minutes of online video"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          value: +d.viewing_time_population,
          period_sort: +d.period_sort
        });
      });

      // Identify the two most recent periods (same quarter, one year apart)
      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_sort; })))
        .sort(function(a, b) { return b - a });
      var latest = sortedPeriods[0];
      var yearAgo = sortedPeriods.find(function(s) {
        return Math.floor(s / 10) === Math.floor(latest / 10) - 1 &&
               (s % 10) === (latest % 10);
      }) || sortedPeriods[1];

      var subset = rows.filter(function(d) {
        return d.period_sort === latest || d.period_sort === yearAgo;
      });

      var latestLabel  = (rows.find(function(d) { return d.period_sort === latest;  }) || {}).period_label || "";
      var yearAgoLabel = (rows.find(function(d) { return d.period_sort === yearAgo; }) || {}).period_label || "";
      var periodOrder  = [yearAgoLabel, latestLabel];

      // Stack order: Other online video bottom (darker #3ecfac), Social video top (lighter #b2f0e0)
      // stackY requires y1/y2 — we compute manually so we control order and can place labels
      var stackOrder = ["Other online video", "Social video"];

      // Build stacked rows with y1 (base) and y2 (top) for each segment
      var stackedRows = [];
      var totals = {};
      periodOrder.forEach(function(period) {
        var cum = 0;
        stackOrder.forEach(function(bm) {
          var row = subset.find(function(d) { return d.period_label === period && d.business_model === bm; });
          var v = row ? row.value : 0;
          stackedRows.push({ period_label: period, business_model: bm, y1: cum, y2: cum + v, mid: cum + v / 2, value: v });
          cum += v;
        });
        totals[period] = cum;
      });

      var maxY = Math.ceil(Math.max.apply(null, Object.values(totals)) * 1.2 / 10) * 10;

      return Plot.plot({
        width: 500,
        height: 380,
        x: { label: null, domain: periodOrder },
        y: { label: "Minutes per day", grid: true, domain: [0, maxY] },
        color: {
          legend: true,
          domain: ["Social video", "Other online video"],
          range: ["#b2f0e0", "#3ecfac"]
        },
        marks: [
          // Stacked bars using explicit y1/y2 — no offset needed
          Plot.barY(stackedRows, {
            x: "period_label",
            y1: "y1",
            y2: "y2",
            fill: "business_model",
            insetLeft: 40,
            insetRight: 40,
            tip: false
          }),
          // Inner segment labels at midpoint of each segment
          Plot.text(stackedRows, {
            x: "period_label",
            y: "mid",
            text: function(d) { return Math.round(d.value) + " min"; },
            fontSize: 13,
            fontWeight: "bold",
            fill: "#1a5c38"
          }),
          // Total labels above each bar
          Plot.text(
            periodOrder.map(function(p) { return { period_label: p, total: totals[p] }; }),
            {
              x: "period_label",
              y: "total",
              text: function(d) { return Math.round(d.total) + " min"; },
              fontSize: 13,
              fontWeight: "bold",
              fill: "#111",
              dy: -10
            }
          ),
          Plot.ruleY([0])
        ],
        marginTop: 40,
        marginBottom: 50,
        marginLeft: 55,
        marginRight: 30
      });

  - id: daily_viewing_minutes_trend
    title: "Daily viewing minutes of online video — trend"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          value: +d.viewing_time_population,
          period_sort: +d.period_sort
        });
      });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) {
        if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label); }
      });
      return Plot.plot({
        width: Math.max(700, periods.length * 60),
        marks: [
          Plot.line(rows, {
            x: "period_label",
            y: "value",
            stroke: "business_model",
            curve: "catmull-rom",
            strokeWidth: 2,
            tip: true
          }),
          Plot.dot(rows, {
            x: "period_label",
            y: "value",
            fill: "business_model",
            r: 4
          })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Minutes per day", grid: true },
        color: {
          legend: true,
          domain: ["Social video", "Other online video"],
          range: ["#b2f0e0", "#3ecfac"]
        },
        marginRight: 160,
        marginBottom: 80
      });
