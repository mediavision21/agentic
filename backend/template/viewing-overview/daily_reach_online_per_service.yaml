description: Daily reach of online video per service — population-weighted Nordic average, top 6 services, grouped by service with one bar per period
sql: |
  WITH weighted AS (
    SELECT
      period_date,
      canonical_name AS service,
      SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS reach_population
    FROM macro.nordic
    WHERE category          = 'online_video'
      AND kpi_type          = 'reach'
      AND canonical_name    IS NOT NULL
      AND kpi_dimension     IS NULL
      AND age_group         = '15-74'
      AND EXTRACT(MONTH FROM period_date) IN (1, 7)
      AND period_date       >= '2013-07-01'
    GROUP BY period_date, canonical_name
  ),
  latest_period AS (
    SELECT MAX(period_date) AS max_period_date FROM weighted
  ),
  top6 AS (
    SELECT service
    FROM weighted
    WHERE period_date = (SELECT max_period_date FROM latest_period)
    ORDER BY reach_population DESC
    LIMIT 6
  )
  SELECT
    w.period_date,
    w.service,
    w.reach_population
  FROM weighted w
  JOIN top6 ON w.service = top6.service
  ORDER BY w.period_date, w.reach_population DESC

plots:
  - id: daily_reach_per_service
    title: "Daily reach of online video per service"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          reach_population: +d.reach_population,
          period_label: fmtPeriod(d.period_date)
        });
      });

      var allPeriods = Array.from(new Set(rows.map(function(d) { return d.period_date; }))).sort();
      var shownPeriods = allPeriods.slice(-6);
      var shownPeriodLabels = shownPeriods.map(function(pd) { return fmtPeriod(pd); });

      var subset = rows.filter(function(d) { return shownPeriods.indexOf(d.period_date) !== -1; });

      var latestPs = shownPeriods[shownPeriods.length - 1];
      var services = subset
        .filter(function(d) { return d.period_date === latestPs; })
        .slice().sort(function(a, b) { return b.reach_population - a.reach_population; })
        .map(function(d) { return d.service; });

      var greens = ["#1a5c38", "#1e6b42", "#237a4c", "#2d8f5a", "#38a86b", "#52c985"];
      var colorRange = greens.slice(0, shownPeriods.length);

      var maxY = Math.ceil(
        Math.max.apply(null, subset.map(function(d) { return d.reach_population; })) * 1.12 / 5
      ) * 5;

      return Plot.plot({
        width: Math.max(700, services.length * 130),
        height: 420,
        marginBottom: 50,
        marginLeft: 55,
        marginRight: 20,
        marginTop: 30,
        x: {
          label: null,
          domain: shownPeriodLabels,
          axis: null
        },
        fx: {
          label: null,
          domain: services,
          padding: 0.15
        },
        y: {
          label: null,
          grid: true,
          domain: [0, maxY],
          tickFormat: function(v) { return v + "%"; }
        },
        color: {
          legend: true,
          domain: shownPeriodLabels,
          range: colorRange
        },
        marks: [
          Plot.barY(subset, {
            fx: "service",
            x: "period_label",
            y: "reach_population",
            fill: "period_label",
            tip: true,
            insetLeft: 1,
            insetRight: 1
          }),
          Plot.ruleY([0])
        ]
      });
