description: Daily reach of online video (Social video, Other online, Total online)
  across Nordic countries
sql: "SELECT\n  period_date,\n  CASE kpi_dimension\n    WHEN 'social'            \
  \       THEN 'Social video'\n    WHEN 'online_excluding_social'  THEN 'Other online'\n\
  \    WHEN 'online_total'             THEN 'Total online'\n  END AS reach_type,\n\
  \  CASE kpi_dimension\n    WHEN 'social'                   THEN 1\n    WHEN 'online_excluding_social'\
  \  THEN 2\n    WHEN 'online_total'             THEN 3\n  END AS reach_order,\n \
  \ SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value\nFROM macro.nordic\n\
  WHERE category      = 'online_video'\n  AND kpi_type      = 'reach'\n  AND kpi_dimension\
  \ IN ('social', 'online_excluding_social', 'online_total')\n  AND canonical_name\
  \ IS NULL\n  AND age_group     = '15-74'\n  AND period_date   >= '2024-07-01'\n\
  \  AND EXTRACT(MONTH FROM period_date) IN (1, 7)\nGROUP BY period_date, kpi_dimension\n\
  ORDER BY period_date, reach_order\n"
plots:
- id: daily_reach_trend
  title: Daily reach of online video — trend
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "value",
                "stroke": "reach_type",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "value",
                "fill": "white",
                "stroke": "reach_type"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Daily reach %",
            "grid": true,
            "domain": [
                0,
                100
            ]
        },
        "color": {
            "legend": true,
            "domain": [
                "Social video",
                "Other online",
                "Total online"
            ],
            "range": [
                "#1a5c38",
                "#2d8653",
                "#52b788"
            ]
        }
    }
- id: daily_reach_compare
  title: Daily reach of online video — latest vs year-ago
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "value",
                "fill": "period_label",
                "fx": "reach_type"
            }
        ],
        "fx": {
            "label": null,
            "domain": [
                "Social video",
                "Other online",
                "Total online"
            ],
            "padding": 0.2
        },
        "x": {
            "label": null,
            "axis": null
        },
        "y": {
            "label": "Daily reach %",
            "grid": true,
            "domain": [
                0,
                100
            ]
        },
        "color": {
            "legend": true,
            "scheme": "greens"
        }
    }
