description: Daily reach of online video (Social video, Other online, Total online) across Nordic countries
sql: |
  SELECT
    period_date,
    CASE kpi_dimension
      WHEN 'social'                   THEN 'Social video'
      WHEN 'online_excluding_social'  THEN 'Other online'
      WHEN 'online_total'             THEN 'Total online'
    END AS reach_type,
    CASE kpi_dimension
      WHEN 'social'                   THEN 1
      WHEN 'online_excluding_social'  THEN 2
      WHEN 'online_total'             THEN 3
    END AS reach_order,
    SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value
  FROM macro.nordic
  WHERE category      = 'online_video'
    AND kpi_type      = 'reach'
    AND kpi_dimension IN ('social', 'online_excluding_social', 'online_total')
    AND canonical_name IS NULL
    AND age_group     = '15-74'
    AND period_date   >= '2024-07-01'
    AND EXTRACT(MONTH FROM period_date) IN (1, 7)
  GROUP BY period_date, kpi_dimension
  ORDER BY period_date, reach_order

plots:
  - id: daily_reach_trend
    title: "Daily reach of online video — trend"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, { value: +d.value, period_label: fmtPeriod(d.period_date) });
      });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_date < b.period_date ? -1 : 1; }).forEach(function(d) {
        if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label); }
      });
      var colorMap = {
        "Social video": "#1a5c38",
        "Other online": "#2d8653",
        "Total online": "#52b788"
      };
      return Plot.plot({
        width: Math.max(800, periods.length * 60),
        marks: [
          Plot.line(rows, {
            x: "period_label",
            y: "value",
            stroke: "reach_type",
            curve: "catmull-rom",
            strokeWidth: 2,
            tip: true
          }),
          Plot.dot(rows, {
            x: "period_label",
            y: "value",
            fill: "reach_type",
            r: 4
          })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Daily reach %", grid: true, domain: [0, 100] },
        color: { legend: true, range: Object.values(colorMap) },
        marginRight: 140,
        marginBottom: 80
      });

  - id: daily_reach_compare
    title: "Daily reach of online video — latest vs year-ago"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, { value: +d.value, period_label: fmtPeriod(d.period_date) });
      });
      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_date; }))).sort();
      var latest = sortedPeriods[sortedPeriods.length - 1];
      var latestD = new Date(latest); var yearAgoD = new Date(latestD); yearAgoD.setUTCFullYear(yearAgoD.getUTCFullYear() - 1);
      var yearAgo = yearAgoD.toISOString().slice(0, 10);
      var subset = rows.filter(function(d) { return d.period_date === latest || d.period_date === yearAgo; });
      var latestLabel = fmtPeriod(latest);
      var yearAgoLabel = fmtPeriod(yearAgo);
      var typeOrder = ["Social video", "Other online", "Total online"];
      return Plot.plot({
        width: 680,
        height: 320,
        fx: { label: null, domain: typeOrder, padding: 0.2 },
        x:  { label: null, domain: [yearAgoLabel, latestLabel], axis: null },
        y:  { label: "Daily reach %", grid: true, domain: [0, 100] },
        color: {
          legend: true,
          domain: [yearAgoLabel, latestLabel],
          range: ["#2d8653", "#1a5c38"]
        },
        marks: [
          Plot.barY(subset, {
            fx: "reach_type",
            x: "period_label",
            y: "value",
            fill: "period_label",
            tip: true,
            insetLeft: 2,
            insetRight: 2
          }),
          Plot.ruleY([0])
        ],
        marginBottom: 40,
        marginTop: 30
      });
