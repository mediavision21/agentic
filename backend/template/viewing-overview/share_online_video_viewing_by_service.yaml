description: Share of online video viewing time by service — population-weighted Nordic
  average, top 10 + Others, stacked bars with boundary lines
sql: "WITH base AS (\n  SELECT\n    n.period_date,\n    n.country,\n    n.canonical_name\
  \ AS service,\n    n.value * r.value AS viewing_time_per_individual,\n    n.population\n\
  \  FROM macro.nordic n\n  JOIN macro.nordic r\n    ON  n.country        = r.country\n\
  \    AND n.period_date    = r.period_date\n    AND n.canonical_name = r.canonical_name\n\
  \  WHERE\n    n.category            = 'online_video'\n    AND n.kpi_type       \
  \ = 'viewing_time'\n    AND n.kpi_dimension   IS NULL\n    AND n.age_group     \
  \  = '15-74'\n    AND n.canonical_name  IS NOT NULL\n    AND r.category        \
  \ = 'online_video'\n    AND r.kpi_type         = 'reach'\n    AND r.kpi_dimension\
  \    IS NULL\n    AND r.age_group        = '15-74'\n    AND (r.is_streaming_service\
  \ OR r.is_avod OR r.is_fast OR r.is_public_service)\n    AND n.period_date     >=\
  \ '2024-07-01'\n    AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)\n),\nservice_time_country\
  \ AS (\n  SELECT\n    period_date, country, service,\n    SUM(viewing_time_per_individual)\
  \ AS vt_individual,\n    MAX(population)                  AS population\n  FROM\
  \ base\n  GROUP BY period_date, country, service\n),\nshares_within_country AS (\n\
  \  SELECT\n    period_date, country, service,\n    vt_individual / NULLIF(SUM(vt_individual)\
  \ OVER (PARTITION BY period_date, country), 0) AS share_in_country,\n    population\n\
  \  FROM service_time_country\n),\ncountry_weights AS (\n  SELECT\n    period_date,\
  \ country,\n    population / NULLIF(SUM(population) OVER (PARTITION BY period_date),\
  \ 0) AS country_weight\n  FROM (SELECT DISTINCT period_date, country, population\
  \ FROM shares_within_country) x\n),\nshares_weighted AS (\n  SELECT\n    s.period_date,\
  \ s.service,\n    SUM(s.share_in_country * w.country_weight) AS share_of_total\n\
  \  FROM shares_within_country s\n  JOIN country_weights w ON s.period_date = w.period_date\
  \ AND s.country = w.country\n  GROUP BY s.period_date, s.service\n),\nlatest_quarter\
  \ AS (\n  SELECT MAX(period_date) AS max_period_date FROM shares_weighted\n),\n\
  service_order AS (\n  SELECT service,\n         ROW_NUMBER() OVER (ORDER BY share_of_total\
  \ DESC) AS global_rank\n  FROM shares_weighted\n  WHERE period_date = (SELECT max_period_date\
  \ FROM latest_quarter)\n    AND share_of_total > 0\n),\nlabeled AS (\n  SELECT\n\
  \    f.period_date,\n    CASE WHEN o.global_rank <= 10 THEN f.service ELSE 'Others'\
  \ END AS service,\n    CASE WHEN o.global_rank > 10  THEN 0 ELSE 11 - o.global_rank\
  \  END AS stack_order,\n    f.share_of_total\n  FROM shares_weighted f\n  JOIN service_order\
  \ o ON f.service = o.service\n)\nSELECT\n  period_date, service,\n  stack_order,\n\
  \  SUM(share_of_total) * 100 AS share_of_total\nFROM labeled\nGROUP BY period_date,\
  \ service, stack_order\nORDER BY period_date, stack_order\n"
plots:
- id: share_online_video_by_service
  title: Share of online video viewing by service
  config: |-
    {
        "marks": [
            {
                "type": "areaY",
                "x": "period_label",
                "y": "share_of_total",
                "fill": "service",
                "z": "service",
                "stack": true
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Share %",
            "grid": true
        },
        "color": {
            "legend": true,
            "scheme": "tableau10"
        }
    }
