description: Share of online video viewing time by service — population-weighted Nordic average, top 10 + Others, stacked bars with boundary lines
sql: |
  WITH base AS (
    SELECT
      n.period_date,
      n.country,
      n.canonical_name AS service,
      n.value * r.value AS viewing_time_per_individual,
      n.population
    FROM macro.nordic n
    JOIN macro.nordic r
      ON  n.country        = r.country
      AND n.period_date    = r.period_date
      AND n.canonical_name = r.canonical_name
    WHERE
      n.category            = 'online_video'
      AND n.kpi_type        = 'viewing_time'
      AND n.kpi_dimension   IS NULL
      AND n.age_group       = '15-74'
      AND n.canonical_name  IS NOT NULL
      AND r.category         = 'online_video'
      AND r.kpi_type         = 'reach'
      AND r.kpi_dimension    IS NULL
      AND r.age_group        = '15-74'
      AND (r.is_streaming_service OR r.is_avod OR r.is_fast OR r.is_public_service)
      AND n.period_date     >= '2024-07-01'
      AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
  ),
  service_time_country AS (
    SELECT
      period_date, country, service,
      SUM(viewing_time_per_individual) AS vt_individual,
      MAX(population)                  AS population
    FROM base
    GROUP BY period_date, country, service
  ),
  shares_within_country AS (
    SELECT
      period_date, country, service,
      vt_individual / NULLIF(SUM(vt_individual) OVER (PARTITION BY period_date, country), 0) AS share_in_country,
      population
    FROM service_time_country
  ),
  country_weights AS (
    SELECT
      period_date, country,
      population / NULLIF(SUM(population) OVER (PARTITION BY period_date), 0) AS country_weight
    FROM (SELECT DISTINCT period_date, country, population FROM shares_within_country) x
  ),
  shares_weighted AS (
    SELECT
      s.period_date, s.service,
      SUM(s.share_in_country * w.country_weight) AS share_of_total
    FROM shares_within_country s
    JOIN country_weights w ON s.period_date = w.period_date AND s.country = w.country
    GROUP BY s.period_date, s.service
  ),
  latest_quarter AS (
    SELECT MAX(period_date) AS max_period_date FROM shares_weighted
  ),
  service_order AS (
    SELECT service,
           ROW_NUMBER() OVER (ORDER BY share_of_total DESC) AS global_rank
    FROM shares_weighted
    WHERE period_date = (SELECT max_period_date FROM latest_quarter)
      AND share_of_total > 0
  ),
  labeled AS (
    SELECT
      f.period_date,
      CASE WHEN o.global_rank <= 10 THEN f.service ELSE 'Others' END AS service,
      CASE WHEN o.global_rank > 10  THEN 0 ELSE 11 - o.global_rank  END AS stack_order,
      f.share_of_total
    FROM shares_weighted f
    JOIN service_order o ON f.service = o.service
  )
  SELECT
    period_date, service,
    stack_order,
    SUM(share_of_total) * 100 AS share_of_total
  FROM labeled
  GROUP BY period_date, service, stack_order
  ORDER BY period_date, stack_order

plots:
  - id: share_online_video_by_service
    title: "Share of online video viewing by service"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          share_of_total: +d.share_of_total,
          stack_order: +d.stack_order,
          period_label: fmtPeriod(d.period_date)
        });
      });

      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_date; }))).sort();
      var latest = sortedPeriods[sortedPeriods.length - 1];
      var latestD = new Date(latest); var yearAgoD = new Date(latestD); yearAgoD.setUTCFullYear(yearAgoD.getUTCFullYear() - 1);
      var yearAgo = yearAgoD.toISOString().slice(0, 10);
      var subset = rows.filter(function(d) { return d.period_date === latest || d.period_date === yearAgo; });
      var latestLabel = fmtPeriod(latest);
      var yearAgoLabel = fmtPeriod(yearAgo);
      var periodOrder  = [yearAgoLabel, latestLabel];

      var servicesMeta = [];
      var seenSvc = {};
      subset.forEach(function(d) {
        if (!seenSvc[d.service]) {
          seenSvc[d.service] = true;
          servicesMeta.push({ service: d.service, stack_order: d.stack_order });
        }
      });
      servicesMeta.sort(function(a, b) {
        var ao = a.stack_order === 0 ? -1 : a.stack_order;
        var bo = b.stack_order === 0 ? -1 : b.stack_order;
        return bo - ao;
      });
      var stackedServices = servicesMeta.map(function(s) { return s.service; });

      var colorPalette = {
        "Netflix":         "#1a5c38",
        "Youtube":         "#52b788",
        "Disney+":         "#95d5b2",
        "HBO Max":         "#1b6b8a",
        "Viaplay":         "#a8d8ea",
        "Prime Video":     "#888888",
        "TV4 Play (SE)":   "#f4b8c8",
        "SVT Play (SE)":   "#e8a0bf",
        "Yle Areena (FI)": "#c075a0",
        "TV2 Play (NO)":   "#6b2080",
        "Others":          "#c8d8c8"
      };
      var fallbackColors = ["#74c2a8","#5b8db8","#e8b84b","#d4765a","#9b59b6","#e67e22"];
      var colorAssigned = {};
      var fallbackIdx = 0;
      stackedServices.forEach(function(svc) {
        colorAssigned[svc] = colorPalette[svc] || fallbackColors[fallbackIdx++ % fallbackColors.length];
      });

      var stackPos = {};
      periodOrder.forEach(function(period) {
        stackPos[period] = {};
        var cum = 0;
        stackedServices.forEach(function(svc) {
          var row = subset.find(function(d) { return d.period_label === period && d.service === svc; });
          var v = row ? row.share_of_total : 0;
          stackPos[period][svc] = { y1: cum, y2: cum + v, value: v };
          cum += v;
        });
      });

      var bandData = [];
      stackedServices.forEach(function(svc) {
        periodOrder.forEach(function(period) {
          var pos = stackPos[period][svc];
          bandData.push({ period_label: period, service: svc, y1: pos.y1, y2: pos.y2 });
        });
      });

      var lineFlatTop = [];
      stackedServices.forEach(function(svc) {
        periodOrder.forEach(function(period) {
          lineFlatTop.push({ period_label: period, service: svc, y: stackPos[period][svc].y2 });
        });
      });

      var legendServices = stackedServices.slice().reverse();

      var chart = Plot.plot({
        width: 380,
        height: 500,
        marginLeft: 50,
        marginRight: 20,
        marginTop: 20,
        marginBottom: 50,
        x: { label: null, domain: periodOrder, padding: 0.4 },
        y: {
          label: null,
          grid: true,
          domain: [0, 100],
          ticks: 5,
          tickFormat: function(v) { return v + "%"; }
        },
        marks: [
          Plot.areaY(bandData, {
            x: "period_label",
            y1: "y1",
            y2: "y2",
            fill: function(d) { return colorAssigned[d.service]; },
            tip: true,
            title: function(d) { return d.service + ": " + (d.y2 - d.y1).toFixed(1) + "%"; }
          }),
          Plot.line(lineFlatTop, {
            x: "period_label",
            y: "y",
            stroke: function(d) { return colorAssigned[d.service]; },
            z: "service",
            strokeWidth: 1.8
          }),
          Plot.dot(lineFlatTop, {
            x: "period_label",
            y: "y",
            fill: "white",
            stroke: function(d) { return colorAssigned[d.service]; },
            strokeWidth: 1.8,
            r: 4
          }),
          Plot.ruleY([0])
        ]
      });

      var legendHtml = legendServices.map(function(svc) {
        return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12px;white-space:nowrap;">'
          + '<svg width="12" height="12" style="flex-shrink:0"><circle cx="6" cy="6" r="5" fill="'
          + colorAssigned[svc] + '"/></svg>'
          + '<span>' + svc + '</span></div>';
      }).join('');

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'display:flex;align-items:flex-start;gap:16px;font-family:sans-serif;';

      var legendEl = document.createElement('div');
      legendEl.style.cssText = 'padding-top:28px;flex-shrink:0;';
      legendEl.innerHTML = legendHtml;

      wrapper.appendChild(chart);
      wrapper.appendChild(legendEl);
      return wrapper;
