category: Viewing - overview
description: Daily reach of social video per service — population-weighted Nordic
  average, all social video services, grouped by service with one bar per period
sql: |-
    WITH weighted AS (
      SELECT
        period_date,
        canonical_name AS service,
        SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS reach_population
      FROM macro.nordic
      WHERE category           = 'online_video'
        AND kpi_type           = 'reach'
        AND canonical_name     IS NOT NULL
        AND kpi_dimension      IS NULL
        AND age_group          = '15-74'
        AND EXTRACT(MONTH FROM period_date) IN (1, 7)
        AND period_date        >= '2020-01-01'
        AND is_social_video = TRUE
      GROUP BY period_date, canonical_name
    ),
    latest_period AS (
      SELECT MAX(period_date) AS max_period_date FROM weighted
    ),
    service_rank AS (
      SELECT service,
             ROW_NUMBER() OVER (ORDER BY reach_population DESC) AS rnk
      FROM weighted
      WHERE period_date = (SELECT max_period_date FROM latest_period)
    )
    SELECT
      w.period_date,
      w.service,
      w.reach_population
    FROM weighted w
    JOIN service_rank sr ON w.service = sr.service
    ORDER BY sr.rnk, w.period_date
plots:
- id: daily_reach_social_video_per_service
  title: Daily reach of social video per service
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "reach_population",
                "fill": "period_label",
                "fx": "service"
            }
        ],
        "x": {
            "label": null,
            "axis": null
        },
        "fx": {
            "label": null,
            "padding": 0.15
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "range": [
                "#1a5c38",
                "#1e6b42",
                "#237a4c",
                "#2d8f5a",
                "#38a86b",
                "#52c985"
            ]
        }
    }
