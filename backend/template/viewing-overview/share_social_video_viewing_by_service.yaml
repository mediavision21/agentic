category: Viewing - overview
description: Share of social video viewing time by service — population-weighted Nordic
  average, stacked bands with boundary lines
sql: "WITH base AS (\n  SELECT\n    n.period_date,\n    n.country,\n    n.canonical_name\
  \ AS service,\n    n.value * r.value AS viewing_time_per_individual,\n    n.population\n\
  \  FROM macro.nordic n\n  JOIN macro.nordic r\n    ON  n.country        = r.country\n\
  \    AND n.period_date    = r.period_date\n    AND n.canonical_name = r.canonical_name\n\
  \  WHERE\n    n.category            = 'online_video'\n    AND n.kpi_type       \
  \ = 'viewing_time'\n    AND n.kpi_dimension   IS NULL\n    AND n.age_group     \
  \  = '15-74'\n    AND n.canonical_name  IS NOT NULL\n    AND r.category        \
  \ = 'online_video'\n    AND r.kpi_type         = 'reach'\n    AND r.kpi_dimension\
  \    IS NULL\n    AND r.age_group        = '15-74'\n    AND r.is_social_video =\
  \ TRUE\n    AND n.period_date     >= '2024-07-01'\n    AND EXTRACT(MONTH FROM n.period_date)\
  \ IN (1, 7)\n),\nservice_time_country AS (\n  SELECT\n    period_date, country,\
  \ service,\n    SUM(viewing_time_per_individual) AS vt_individual,\n    MAX(population)\
  \                  AS population\n  FROM base\n  GROUP BY period_date, country,\
  \ service\n),\nshares_within_country AS (\n  SELECT\n    period_date, country, service,\n\
  \    vt_individual / NULLIF(SUM(vt_individual) OVER (PARTITION BY period_date, country),\
  \ 0) AS share_in_country,\n    population\n  FROM service_time_country\n),\ncountry_weights\
  \ AS (\n  SELECT\n    period_date, country,\n    population / NULLIF(SUM(population)\
  \ OVER (PARTITION BY period_date), 0) AS country_weight\n  FROM (SELECT DISTINCT\
  \ period_date, country, population FROM shares_within_country) x\n),\nfinal AS (\n\
  \  SELECT\n    s.period_date, s.service,\n    SUM(s.share_in_country * w.country_weight)\
  \ * 100 AS share_of_total\n  FROM shares_within_country s\n  JOIN country_weights\
  \ w ON s.period_date = w.period_date AND s.country = w.country\n  GROUP BY s.period_date,\
  \ s.service\n),\nlatest_quarter AS (\n  SELECT MAX(period_date) AS max_period_date\
  \ FROM final\n),\nservice_rank AS (\n  SELECT service,\n         ROW_NUMBER() OVER\
  \ (ORDER BY share_of_total DESC) AS rnk\n  FROM final\n  WHERE period_date = (SELECT\
  \ max_period_date FROM latest_quarter)\n)\nSELECT\n  f.period_date, f.service, f.share_of_total,\n\
  \  sr.rnk\nFROM final f\nJOIN service_rank sr ON f.service = sr.service\nORDER BY\
  \ f.period_date, sr.rnk\n"
plots:
- id: share_social_video_by_service
  title: Share of social video viewing by service
  config: |-
    {
        "marks": [
            {
                "type": "areaY",
                "x": "period_label",
                "y": "share_of_total",
                "fill": "service",
                "z": "service",
                "stack": true
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Share %",
            "grid": true
        },
        "color": {
            "legend": true,
            "scheme": "tableau10"
        }
    }
