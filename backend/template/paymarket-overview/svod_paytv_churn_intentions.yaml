description: SVOD and Pay TV churn intentions — household-weighted Nordic average
  trend
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: "SELECT\n    n.period_date,\n    CASE\n        WHEN n.category = 'online_video'\
  \ AND n.kpi_dimension = 'svod' THEN 'SVOD'\n        WHEN n.category = 'tv' THEN\
  \ 'Pay TV'\n    END AS business_model,\n    SUM(n.value * n.population_household)\n\
  \        / NULLIF(SUM(n.population_household), 0) * 100 AS churn_intention\nFROM\
  \ macro.nordic n\nWHERE\n    n.kpi_type = 'churn_intention'\n    AND n.population_segment\
  \ = 'subscribers'\n    AND n.canonical_name IS NULL\n    AND n.age_group = '15-74'\n\
  \    AND n.value IS NOT NULL\n    AND (\n        (n.category = 'online_video' AND\
  \ n.kpi_dimension = 'svod')\n        OR n.category = 'tv'\n    )\n    [[ AND {{country}}\
  \ ]]\n    [[ AND {{year}} ]]\n    [[ AND {{quarter_label}} ]]\nGROUP BY n.period_date,\
  \ n.category, n.kpi_dimension\nORDER BY n.period_date, business_model\n"
plots:
- id: svod_paytv_churn_intentions
  title: SVOD and Pay TV churn intentions
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "churn_intention",
                "stroke": "business_model",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "churn_intention",
                "fill": "white",
                "stroke": "business_model"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "SVOD",
                "Pay TV"
            ],
            "range": [
                "#52b788",
                "#2b2a29"
            ]
        }
    }
