description: SVOD and Pay TV churn intentions — household-weighted Nordic average
  trend
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: |-
    SELECT
        n.period_date,
        CASE
            WHEN n.category = 'online_video' AND n.kpi_dimension = 'svod' THEN 'SVOD'
            WHEN n.category = 'tv' THEN 'Pay TV'
        END AS business_model,
        SUM(n.value * n.population_household)
            / NULLIF(SUM(n.population_household), 0) * 100 AS value
    FROM macro.nordic n
    WHERE
        n.kpi_type = 'churn_intention'
        AND n.population_segment = 'subscribers'
        AND n.canonical_name IS NULL
        AND n.age_group = '15-74'
        AND n.value IS NOT NULL
        AND (
            (n.category = 'online_video' AND n.kpi_dimension = 'svod')
            OR n.category = 'tv'
        )
        [[ AND {{country}} ]]
        [[ AND {{year}} ]]
        [[ AND {{quarter_label}} ]]
    GROUP BY n.period_date, n.category, n.kpi_dimension
    ORDER BY n.period_date, business_model
plots:
- id: svod_paytv_churn_intentions
  title: SVOD and Pay TV churn intentions
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "value",
                "stroke": "business_model",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "value",
                "fill": "white",
                "stroke": "business_model"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "SVOD",
                "Pay TV"
            ],
            "range": [
                "#52b788",
                "#2b2a29"
            ]
        }
    }
