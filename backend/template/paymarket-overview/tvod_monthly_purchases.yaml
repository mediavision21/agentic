description: TVOD monthly purchases — household-weighted Nordic average trend
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: "SELECT\n    n.period_date,\n    'TVOD' AS business_model,\n    SUM(n.value *\
  \ n.population_household)\n        / NULLIF(SUM(n.population_household), 0) * 100\
  \ AS tvod\nFROM macro.nordic n\nWHERE\n    n.category = 'tvod'\n    AND n.kpi_type\
  \ = 'reach_monthly'\n    AND n.canonical_name IS NULL\n    AND n.age_group = '15-74'\n\
  \    AND n.value IS NOT NULL\n    [[ AND {{country}} ]]\n    [[ AND {{year}} ]]\n\
  \    [[ AND {{quarter_label}} ]]\nGROUP BY n.period_date\nORDER BY n.period_date\n"
plots:
- id: tvod_monthly_purchases
  title: 'TVOD: monthly purchases'
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "tvod",
                "stroke": "#1a5c38",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "tvod",
                "fill": "white",
                "stroke": "#1a5c38"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        }
    }
