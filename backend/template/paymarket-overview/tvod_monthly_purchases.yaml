description: TVOD monthly purchases — household-weighted Nordic average trend
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: |-
    SELECT
        n.period_date,
        'TVOD' AS business_model,
        SUM(n.value * n.population_household)
            / NULLIF(SUM(n.population_household), 0) * 100 AS tvod
    FROM macro.nordic n
    WHERE
        n.category = 'tvod'
        AND n.kpi_type = 'reach_monthly'
        AND n.canonical_name IS NULL
        AND n.age_group = '15-74'
        AND n.value IS NOT NULL
        [[ AND {{country}} ]]
        [[ AND {{year}} ]]
        [[ AND {{quarter_label}} ]]
    GROUP BY n.period_date
    ORDER BY n.period_date
plots:
- id: tvod_monthly_purchases
  title: 'TVOD: monthly purchases'
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "tvod",
                "stroke": "#1a5c38",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "tvod",
                "fill": "white",
                "stroke": "#1a5c38"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        }
    }
