description: Household penetration by video type (SVOD, SSVOD, BSVOD, HVOD, Pay TV channel, TVE) across Nordic countries
sql: |
  WITH base AS (
      SELECT
          n.period_date,
          n.country,
          n.kpi_dimension,
          n.value AS penetration_country,
          n.population_household
      FROM macro.nordic n
      WHERE
          n.category IN ('online_video', 'tv')
          AND n.kpi_type = 'penetration'
          AND n.kpi_dimension IN (
              'svod',
              'ssvod',
              'bsvod',
              'hvod',
              'tve',
              'pay_tv_channel'
          )
          AND n.age_group = '15-74'
          AND (
              (
                  n.kpi_dimension IN ('svod', 'ssvod', 'bsvod')
                  AND n.period_date >= '2016-01-01'
              )
              OR (
                  n.kpi_dimension = 'hvod'
                  AND n.period_date >= '2022-07-01'
              )
              OR n.kpi_dimension = 'tve'
              OR n.kpi_dimension = 'pay_tv_channel'
          )
          AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
          [[ AND {{country}} ]]
          [[ AND {{year}} ]]
          [[ AND {{quarter_label}} ]]
  )
  SELECT
      period_date,
      UPPER(kpi_dimension) AS business_model,
      SUM(penetration_country * population_household)
          / NULLIF(SUM(population_household), 0) AS penetration
  FROM base
  GROUP BY
      period_date,
      kpi_dimension
  ORDER BY
      period_date,
      business_model;

plots:
  - id: household_penetration_trend
    title: "Household penetration by video type — trend"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          penetration: +d.penetration * 100,
          period_label: fmtPeriod(d.period_date)
        });
      });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_date < b.period_date ? -1 : 1; }).forEach(function(d) {
        if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label); }
      });
      var colorMap = {
        "SVOD":           "#1a5c38",
        "SSVOD":          "#b83c26",
        "BSVOD":          "#d4a017",
        "HVOD":           "#c9a0dc",
        "PAY_TV_CHANNEL": "#111111",
        "TVE":            "#cccccc"
      };
      var modelOrder = ["SVOD", "SSVOD", "BSVOD", "HVOD", "PAY_TV_CHANNEL", "TVE"];
      return Plot.plot({
        width: Math.max(900, periods.length * 80),
        marks: [
          Plot.line(rows, {
            x: "period_label",
            y: "penetration",
            stroke: "business_model",
            curve: "catmull-rom",
            strokeWidth: 2,
            tip: true
          }),
          Plot.dot(rows, {
            x: "period_label",
            y: "penetration",
            fill: "business_model",
            r: 4
          })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Household penetration %", grid: true, domain: [0, 100] },
        color: {
          legend: true,
          domain: modelOrder,
          range: modelOrder.map(function(m) { return colorMap[m]; })
        },
        marginRight: 160,
        marginBottom: 80
      });

  - id: household_penetration_compare
    title: "Household penetration by video type — latest vs year-ago"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          penetration: +d.penetration * 100,
          period_label: fmtPeriod(d.period_date)
        });
      });
      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_date; }))).sort();
      var latest = sortedPeriods[sortedPeriods.length - 1];
      var latestD = new Date(latest); var yearAgoD = new Date(latestD); yearAgoD.setUTCFullYear(yearAgoD.getUTCFullYear() - 1);
      var yearAgo = yearAgoD.toISOString().slice(0, 10);
      var subset = rows.filter(function(d) { return d.period_date === latest || d.period_date === yearAgo; });
      var latestLabel = fmtPeriod(latest);
      var yearAgoLabel = fmtPeriod(yearAgo);
      var modelOrder = ["SVOD", "SSVOD", "BSVOD", "HVOD", "PAY_TV_CHANNEL", "TVE"];
      return Plot.plot({
        width: 900,
        height: 360,
        fx: { label: null, domain: modelOrder, padding: 0.2 },
        x:  { label: null, domain: [yearAgoLabel, latestLabel], axis: null },
        y:  { label: "Household penetration %", grid: true, domain: [0, 100] },
        color: {
          legend: true,
          domain: [yearAgoLabel, latestLabel],
          range: ["#2d8653", "#1a5c38"]
        },
        marks: [
          Plot.barY(subset, {
            fx: "business_model",
            x: "period_label",
            y: "penetration",
            fill: "period_label",
            tip: true,
            insetLeft: 2,
            insetRight: 2
          }),
          Plot.ruleY([0])
        ],
        marginBottom: 40,
        marginTop: 30
      });
