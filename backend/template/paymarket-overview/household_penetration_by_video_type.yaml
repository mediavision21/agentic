description: Household penetration by video type (SVOD, SSVOD, BSVOD, HVOD, Pay TV
  channel, TVE) across Nordic countries
sql: "WITH base AS (\n    SELECT\n        n.period_date,\n        n.country,\n   \
  \     n.kpi_dimension,\n        n.value AS penetration_country,\n        n.population_household\n\
  \    FROM macro.nordic n\n    WHERE\n        n.category IN ('online_video', 'tv')\n\
  \        AND n.kpi_type = 'penetration'\n        AND n.kpi_dimension IN (\n    \
  \        'svod',\n            'ssvod',\n            'bsvod',\n            'hvod',\n\
  \            'tve',\n            'pay_tv_channel'\n        )\n        AND n.age_group\
  \ = '15-74'\n        AND (\n            (\n                n.kpi_dimension IN ('svod',\
  \ 'ssvod', 'bsvod')\n                AND n.period_date >= '2016-01-01'\n       \
  \     )\n            OR (\n                n.kpi_dimension = 'hvod'\n          \
  \      AND n.period_date >= '2022-07-01'\n            )\n            OR n.kpi_dimension\
  \ = 'tve'\n            OR n.kpi_dimension = 'pay_tv_channel'\n        )\n      \
  \  AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)\n        [[ AND {{country}} ]]\n\
  \        [[ AND {{year}} ]]\n        [[ AND {{quarter_label}} ]]\n)\nSELECT\n  \
  \  period_date,\n    UPPER(kpi_dimension) AS business_model,\n    SUM(penetration_country\
  \ * population_household)\n        / NULLIF(SUM(population_household), 0) * 100\
  \ AS penetration\nFROM base\nGROUP BY\n    period_date,\n    kpi_dimension\nORDER\
  \ BY\n    period_date,\n    business_model;\n"
plots:
- id: household_penetration_trend
  title: Household penetration by video type — trend
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "penetration",
                "stroke": "business_model",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "penetration",
                "fill": "white",
                "stroke": "business_model"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Household penetration %",
            "grid": true,
            "domain": [
                0,
                100
            ]
        },
        "color": {
            "legend": true,
            "domain": [
                "SVOD",
                "SSVOD",
                "BSVOD",
                "HVOD",
                "PAY_TV_CHANNEL",
                "TVE"
            ],
            "range": [
                "#1a5c38",
                "#b83c26",
                "#d4a017",
                "#c9a0dc",
                "#111111",
                "#cccccc"
            ]
        }
    }
- id: household_penetration_compare
  title: Household penetration by video type — latest vs year-ago
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "penetration",
                "fill": "period_label",
                "fx": "business_model"
            }
        ],
        "fx": {
            "label": null,
            "domain": [
                "SVOD",
                "SSVOD",
                "BSVOD",
                "HVOD",
                "PAY_TV_CHANNEL",
                "TVE"
            ],
            "padding": 0.2
        },
        "x": {
            "label": null,
            "axis": null
        },
        "y": {
            "label": "Household penetration %",
            "grid": true,
            "domain": [
                0,
                100
            ]
        },
        "color": {
            "legend": true,
            "scheme": "greens"
        }
    }
