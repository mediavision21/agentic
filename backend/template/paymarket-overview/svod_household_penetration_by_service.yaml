description: SVOD household penetration by service across Nordic countries, top 15 services ranked by latest period
filters:
  quarter_label:
    choices: [Q1]
    default: [Q1]
sql: |
  WITH base AS (
      SELECT
          n.period_date,
          n.country,
          n.canonical_name AS service,
          n.value AS penetration_country,
          n.population_household
      FROM macro.nordic n
      WHERE
          n.category = 'online_video'
          AND n.kpi_type = 'penetration'
          AND n.kpi_dimension = 'svod'
          AND n.canonical_name IS NOT NULL
          AND n.age_group = '15-74'
          AND n.value IS NOT NULL
          AND n.value > 0
          AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
          [[ AND {{country}} ]]
          [[ AND {{year}} ]]
          [[ AND {{quarter_label}} ]]
          [[ AND {{service}} ]]
  ),
  penetration_weighted AS (
      SELECT
          period_date,
          service,
          SUM(penetration_country * population_household)
              / NULLIF(SUM(population_household), 0) AS penetration_household_weighted
      FROM base
      GROUP BY period_date, service
  ),
  latest_period AS (
      SELECT MAX(period_date) AS max_period_date
      FROM penetration_weighted
  ),
  service_rank AS (
      SELECT
          service,
          ROW_NUMBER() OVER (ORDER BY penetration_household_weighted DESC) AS service_rank
      FROM penetration_weighted
      WHERE period_date = (SELECT max_period_date FROM latest_period)
  ),
  top_services AS (
      SELECT service, service_rank
      FROM service_rank
      WHERE service_rank <= 15
  ),
  periods AS (
      SELECT DISTINCT period_date
      FROM penetration_weighted
  ),
  service_period_grid AS (
      SELECT
          ts.service,
          ts.service_rank,
          p.period_date
      FROM top_services ts
      CROSS JOIN periods p
  )
  SELECT
      g.period_date,
      g.service,
      g.service_rank,
      pw.penetration_household_weighted AS penetration
  FROM service_period_grid g
  LEFT JOIN penetration_weighted pw
    ON pw.service = g.service
   AND pw.period_date = g.period_date
  ORDER BY
      g.service_rank,
      g.period_date;

plots:
  - id: svod_penetration_by_service
    title: "SVOD household penetration by service"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          penetration: +d.penetration * 100,
          service_rank: +d.service_rank,
          period_label: fmtPeriod(d.period_date)
        });
      });
      var periods = Array.from(new Set(
        rows.slice().sort(function(a, b) { return a.period_date < b.period_date ? -1 : 1; }).map(function(d) { return d.period_label; })
      ));
      var services = Array.from(
        new Map(rows.map(function(d) { return [d.service, d.service_rank]; })).entries()
      ).sort(function(a, b) { return a[1] - b[1]; }).map(function(e) { return e[0]; });
      var greens = ["#c7e8c7", "#8dc88d", "#52a852", "#2d8653", "#1a6640", "#0f3d26"];
      var colorRange = periods.map(function(_, i) {
        return greens[Math.round(i * (greens.length - 1) / Math.max(periods.length - 1, 1))];
      });
      return Plot.plot({
        width: Math.max(1000, services.length * 65),
        height: 420,
        fx: { label: null, domain: services, padding: 0.15 },
        x:  { label: null, domain: periods, axis: null },
        y:  { label: "Household penetration %", grid: true, domain: [0, 50] },
        color: {
          legend: true,
          domain: periods,
          range: colorRange
        },
        marks: [
          Plot.barY(rows, {
            fx: "service",
            x: "period_label",
            y: "penetration",
            fill: "period_label",
            tip: true,
            insetLeft: 1,
            insetRight: 1
          }),
          Plot.ruleY([0])
        ],
        marginBottom: 60,
        marginTop: 40,
        marginLeft: 50
      });
