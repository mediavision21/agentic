description: SVOD household penetration by service across Nordic countries, top 15
  services ranked by latest period
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: "WITH base AS (\n    SELECT\n        n.period_date,\n        n.country,\n   \
  \     n.canonical_name AS service,\n        n.value AS penetration_country,\n  \
  \      n.population_household\n    FROM macro.nordic n\n    WHERE\n        n.category\
  \ = 'online_video'\n        AND n.kpi_type = 'penetration'\n        AND n.kpi_dimension\
  \ = 'svod'\n        AND n.canonical_name IS NOT NULL\n        AND n.age_group =\
  \ '15-74'\n        AND n.value IS NOT NULL\n        AND n.value > 0\n        AND\
  \ EXTRACT(MONTH FROM n.period_date) IN (1, 7)\n        [[ AND {{country}} ]]\n \
  \       [[ AND {{year}} ]]\n        [[ AND {{quarter_label}} ]]\n        [[ AND\
  \ {{service}} ]]\n),\npenetration_weighted AS (\n    SELECT\n        period_date,\n\
  \        service,\n        SUM(penetration_country * population_household)\n   \
  \         / NULLIF(SUM(population_household), 0) AS penetration_household_weighted\n\
  \    FROM base\n    GROUP BY period_date, service\n),\nlatest_period AS (\n    SELECT\
  \ MAX(period_date) AS max_period_date\n    FROM penetration_weighted\n),\nservice_rank\
  \ AS (\n    SELECT\n        service,\n        ROW_NUMBER() OVER (ORDER BY penetration_household_weighted\
  \ DESC) AS service_rank\n    FROM penetration_weighted\n    WHERE period_date =\
  \ (SELECT max_period_date FROM latest_period)\n),\ntop_services AS (\n    SELECT\
  \ service, service_rank\n    FROM service_rank\n    WHERE service_rank <= 15\n),\n\
  periods AS (\n    SELECT DISTINCT period_date\n    FROM penetration_weighted\n),\n\
  service_period_grid AS (\n    SELECT\n        ts.service,\n        ts.service_rank,\n\
  \        p.period_date\n    FROM top_services ts\n    CROSS JOIN periods p\n)\n\
  SELECT\n    g.period_date,\n    g.service,\n    g.service_rank,\n    pw.penetration_household_weighted\
  \ * 100 AS penetration\nFROM service_period_grid g\nLEFT JOIN penetration_weighted\
  \ pw\n  ON pw.service = g.service\n AND pw.period_date = g.period_date\nORDER BY\n\
  \    g.service_rank,\n    g.period_date;\n"
plots:
- id: svod_penetration_by_service
  title: SVOD household penetration by service
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "penetration",
                "fill": "period_label",
                "fx": "service"
            }
        ],
        "x": {
            "label": null,
            "axis": null
        },
        "fx": {
            "label": null,
            "padding": 0.15
        },
        "y": {
            "label": "Household penetration %",
            "grid": true
        },
        "color": {
            "legend": true,
            "range": [
                "#c7e8c7",
                "#8dc88d",
                "#52a852",
                "#2d8653",
                "#1a6640",
                "#0f3d26"
            ]
        }
    }
