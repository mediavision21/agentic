description: Number of SVOD subscriptions (millions) split into Ad-free and HVOD —
  Nordic total
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: "WITH svod AS (\n    SELECT n.country, n.period_date,\n           n.value AS\
  \ penetration_svod, n.population_household\n    FROM macro.nordic n\n    WHERE n.category\
  \ = 'online_video'\n      AND n.kpi_type = 'penetration'\n      AND n.kpi_dimension\
  \ = 'svod'\n      AND n.canonical_name IS NULL\n      AND n.age_group = '15-74'\n\
  \      AND n.value IS NOT NULL\n      [[ AND {{country}} ]]\n      [[ AND {{year}}\
  \ ]]\n      [[ AND {{quarter_label}} ]]\n),\nsvod_stacking AS (\n    SELECT n.country,\
  \ n.period_date, n.value AS stacking_svod\n    FROM macro.nordic n\n    WHERE n.category\
  \ = 'online_video'\n      AND n.kpi_type = 'stacking'\n      AND n.kpi_dimension\
  \ = 'svod'\n      AND n.population_segment = 'subscribers'\n      AND n.canonical_name\
  \ IS NULL\n      AND n.age_group = '15-74'\n      AND n.value IS NOT NULL\n),\n\
  hvod AS (\n    SELECT n.country, n.period_date, n.value AS penetration_hvod\n  \
  \  FROM macro.nordic n\n    WHERE n.category = 'online_video'\n      AND n.kpi_type\
  \ = 'penetration'\n      AND n.kpi_dimension = 'hvod'\n      AND n.canonical_name\
  \ IS NULL\n      AND n.age_group = '15-74'\n      AND n.value IS NOT NULL\n),\n\
  hvod_stacking AS (\n    SELECT n.country, n.period_date, n.value AS stacking_hvod\n\
  \    FROM macro.nordic n\n    WHERE n.category = 'online_video'\n      AND n.kpi_type\
  \ = 'stacking'\n      AND n.kpi_dimension = 'hvod'\n      AND n.population_segment\
  \ = 'subscribers'\n      AND n.canonical_name IS NULL\n      AND n.age_group = '15-74'\n\
  \      AND n.value IS NOT NULL\n),\nbase AS (\n    SELECT\n        sv.period_date,\n\
  \        sv.country,\n        sv.penetration_svod * svs.stacking_svod * sv.population_household\
  \ AS svod_subs,\n        hv.penetration_hvod * hvs.stacking_hvod * sv.population_household\
  \ AS hvod_subs\n    FROM svod sv\n    JOIN svod_stacking svs\n      ON sv.country\
  \ = svs.country AND sv.period_date = svs.period_date\n    JOIN hvod hv\n      ON\
  \ sv.country = hv.country AND sv.period_date = hv.period_date\n    JOIN hvod_stacking\
  \ hvs\n      ON sv.country = hvs.country AND sv.period_date = hvs.period_date\n\
  \    WHERE sv.period_date >= '2024-07-01'\n),\nagg AS (\n    SELECT\n        period_date,\n\
  \        SUM(hvod_subs) AS hvod_total,\n        SUM(svod_subs - hvod_subs) AS adfree_total\n\
  \    FROM base\n    GROUP BY period_date\n)\nSELECT period_date, 'Ad-free' AS subscription_type,\
  \ adfree_total / 1000 AS subscriptions FROM agg\nUNION ALL\nSELECT period_date,\
  \ 'HVOD' AS subscription_type, hvod_total / 1000 AS subscriptions FROM agg\nORDER\
  \ BY period_date, subscription_type\n"
plots:
- id: svod_subs_adfree_vs_hvod
  title: 'Number of SVOD subs (million): Ad-free vs HVOD'
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "subscriptions",
                "fill": "subscription_type",
                "stack": true
            }
        ],
        "y": {
            "label": "Million subscriptions",
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "HVOD",
                "Ad-free"
            ],
            "range": [
                "#d9dcdf",
                "#3d4952"
            ]
        }
    }
