description: HVOD household penetration by service across Nordic countries, top 15
  services ranked by latest period
sql: |-
    WITH base AS (
        SELECT
            n.period_date,
            n.country,
            n.canonical_name AS service,
            n.value AS penetration_country,
            n.population_household
        FROM macro.nordic n
        WHERE
            n.category = 'online_video'
            AND n.kpi_type = 'penetration'
            AND n.kpi_dimension = 'hvod'
            AND n.canonical_name IS NOT NULL
            AND n.age_group = '15-74'
            AND n.value IS NOT NULL
            AND n.value > 0
            AND n.period_date >= '2024-01-01'
            [[ AND {{country}} ]]
            [[ AND {{year}} ]]
            [[ AND {{quarter_label}} ]]
    ),
    penetration_weighted AS (
        SELECT
            period_date,
            service,
            SUM(penetration_country * population_household)
                / NULLIF(SUM(population_household), 0) AS penetration_household_weighted
        FROM base
        GROUP BY period_date, service
    ),
    latest_period AS (
        SELECT MAX(period_date) AS max_period_date
        FROM penetration_weighted
    ),
    service_rank AS (
        SELECT
            service,
            ROW_NUMBER() OVER (ORDER BY penetration_household_weighted DESC) AS service_rank
        FROM penetration_weighted
        WHERE period_date = (SELECT max_period_date FROM latest_period)
    ),
    top_services AS (
        SELECT service, service_rank
        FROM service_rank
        WHERE service_rank <= 15
    ),
    periods AS (
        SELECT DISTINCT period_date
        FROM penetration_weighted
    ),
    service_period_grid AS (
        SELECT
            ts.service,
            ts.service_rank,
            p.period_date
        FROM top_services ts
        CROSS JOIN periods p
    )
    SELECT
        g.period_date,
        g.service,
        g.service_rank,
        pw.penetration_household_weighted * 100 AS penetration
    FROM service_period_grid g
    LEFT JOIN penetration_weighted pw
      ON pw.service = g.service
     AND pw.period_date = g.period_date
    ORDER BY
        g.service_rank,
        g.period_date;
plots:
- id: hvod_penetration_by_service
  title: HVOD household penetration by service
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "penetration",
                "fill": "period_label",
                "fx": "service"
            }
        ],
        "x": {
            "label": null,
            "axis": null
        },
        "fx": {
            "label": null,
            "padding": 0.15
        },
        "y": {
            "label": "Household penetration %",
            "grid": true
        },
        "color": {
            "legend": true,
            "range": [
                "#c7e8c7",
                "#8dc88d",
                "#52a852",
                "#2d8653",
                "#1a6640",
                "#0f3d26"
            ]
        }
    }
