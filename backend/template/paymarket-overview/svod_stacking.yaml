description: Average number of SVOD subscriptions among subscribing households — household-weighted
  Nordic average
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: "SELECT\n    n.period_date,\n    SUM(n.value * n.population_household)\n    \
  \    / NULLIF(SUM(n.population_household), 0) AS stacking\nFROM macro.nordic n\n\
  WHERE\n    n.category = 'online_video'\n    AND n.kpi_type = 'stacking'\n    AND\
  \ n.kpi_dimension = 'svod'\n    AND n.population_segment = 'subscribers'\n    AND\
  \ n.age_group = '15-74'\n    AND n.canonical_name IS NULL\n    AND n.kpi_detail\
  \ IS NULL\n    AND n.value IS NOT NULL\n    [[ AND {{country}} ]]\n    [[ AND {{year}}\
  \ ]]\n    [[ AND {{quarter_label}} ]]\nGROUP BY n.period_date\nORDER BY n.period_date\n"
plots:
- id: svod_stacking
  title: SVOD stacking
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "stacking",
                "fill": "#1a5c38"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        }
    }
