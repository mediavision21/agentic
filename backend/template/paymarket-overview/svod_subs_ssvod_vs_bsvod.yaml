description: Number of SVOD subscriptions (millions) split into S-SVOD and B-SVOD
  — household-weighted Nordic total
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: "WITH svod AS (\n    SELECT n.country, n.period_date,\n           n.value AS\
  \ penetration_svod, n.population_household\n    FROM macro.nordic n\n    WHERE n.category\
  \ = 'online_video'\n      AND n.kpi_type = 'penetration'\n      AND n.kpi_dimension\
  \ = 'svod'\n      AND n.canonical_name IS NULL\n      AND n.age_group = '15-74'\n\
  \      AND n.value IS NOT NULL\n      [[ AND {{country}} ]]\n      [[ AND {{year}}\
  \ ]]\n      [[ AND {{quarter_label}} ]]\n),\nsvod_stacking AS (\n    SELECT n.country,\
  \ n.period_date, n.value AS stacking_svod\n    FROM macro.nordic n\n    WHERE n.category\
  \ = 'online_video'\n      AND n.kpi_type = 'stacking'\n      AND n.kpi_dimension\
  \ = 'svod'\n      AND n.population_segment = 'subscribers'\n      AND n.canonical_name\
  \ IS NULL\n      AND n.age_group = '15-74'\n      AND n.value IS NOT NULL\n),\n\
  ssvod AS (\n    SELECT n.country, n.period_date, n.value AS penetration_ssvod\n\
  \    FROM macro.nordic n\n    WHERE n.category = 'online_video'\n      AND n.kpi_type\
  \ = 'penetration'\n      AND n.kpi_dimension = 'ssvod'\n      AND n.canonical_name\
  \ IS NULL\n      AND n.age_group = '15-74'\n      AND n.value IS NOT NULL\n),\n\
  ssvod_stacking AS (\n    SELECT n.country, n.period_date, n.value AS stacking_ssvod\n\
  \    FROM macro.nordic n\n    WHERE n.category = 'online_video'\n      AND n.kpi_type\
  \ = 'stacking'\n      AND n.kpi_dimension = 'ssvod'\n      AND n.population_segment\
  \ = 'subscribers'\n      AND n.canonical_name IS NULL\n      AND n.age_group = '15-74'\n\
  \      AND n.value IS NOT NULL\n),\nbase AS (\n    SELECT\n        sv.period_date,\n\
  \        sv.country,\n        sv.penetration_svod * svs.stacking_svod * sv.population_household\
  \ AS svod_subs,\n        ssv.penetration_ssvod * ssvs.stacking_ssvod * sv.population_household\
  \ AS ssvod_subs\n    FROM svod sv\n    JOIN svod_stacking svs\n      ON sv.country\
  \ = svs.country AND sv.period_date = svs.period_date\n    JOIN ssvod ssv\n     \
  \ ON sv.country = ssv.country AND sv.period_date = ssv.period_date\n    JOIN ssvod_stacking\
  \ ssvs\n      ON sv.country = ssvs.country AND sv.period_date = ssvs.period_date\n\
  \    WHERE sv.period_date >= '2020-07-01'\n),\nagg AS (\n    SELECT\n        period_date,\n\
  \        SUM(ssvod_subs) AS ssvod_total,\n        SUM(svod_subs - ssvod_subs) AS\
  \ bsvod_total\n    FROM base\n    GROUP BY period_date\n)\nSELECT period_date, 'SSVOD'\
  \ AS subscription_type, ssvod_total / 1000 AS subscriptions FROM agg\nUNION ALL\n\
  SELECT period_date, 'BSVOD' AS subscription_type, bsvod_total / 1000 AS subscriptions\
  \ FROM agg\nORDER BY period_date, subscription_type\n"
plots:
- id: svod_subs_ssvod_vs_bsvod
  title: 'Number of SVOD subs (million): S-SVOD vs B-SVOD'
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "subscriptions",
                "fill": "subscription_type",
                "stack": true
            }
        ],
        "y": {
            "label": "Million subscriptions",
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "BSVOD",
                "SSVOD"
            ],
            "range": [
                "#e8a838",
                "#b83c26"
            ]
        }
    }
