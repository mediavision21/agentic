category: overview
description: Daily reach of online video (Social video, Other online, Total online) across Nordic countries
sql: |
  SELECT
    period_sort,
    period_label,
    CASE kpi_dimension
      WHEN 'social'                   THEN 'Social video'
      WHEN 'online_excluding_social'  THEN 'Other online'
      WHEN 'online_total'             THEN 'Total online'
    END AS reach_type,
    CASE kpi_dimension
      WHEN 'social'                   THEN 1
      WHEN 'online_excluding_social'  THEN 2
      WHEN 'online_total'             THEN 3
    END AS reach_order,
    SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value
  FROM macro.nordic
  WHERE category      = 'online_video'
    AND kpi_type      = 'reach'
    AND kpi_dimension IN ('social', 'online_excluding_social', 'online_total')
    AND canonical_name IS NULL
    AND age_group     = '15-74'
    AND population_segment IS NULL
    AND period_sort   >= 20243
    AND quarter       IN (1, 3)
  GROUP BY period_sort, period_label, kpi_dimension
  ORDER BY period_sort, reach_order

plots:
  - id: daily_reach_trend
    title: "Daily reach of online video — trend"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort });
      });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) {
        if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label); }
      });
      var colorMap = {
        "Social video": "#1a5c38",
        "Other online": "#2d8653",
        "Total online": "#52b788"
      };
      return Plot.plot({
        width: Math.max(800, periods.length * 60),
        marks: [
          Plot.line(rows, {
            x: "period_label",
            y: "value",
            stroke: "reach_type",
            curve: "catmull-rom",
            strokeWidth: 2,
            tip: true
          }),
          Plot.dot(rows, {
            x: "period_label",
            y: "value",
            fill: "reach_type",
            r: 4
          })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Daily reach %", grid: true, domain: [0, 100] },
        color: { legend: true, range: Object.values(colorMap) },
        marginRight: 140,
        marginBottom: 80
      });

  - id: daily_reach_compare
    title: "Daily reach of online video — latest vs year-ago"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort });
      });
      // Identify the two most recent distinct period_sort values (same quarter, one year apart)
      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_sort; })))
        .sort(function(a, b) { return b - a });
      var latest = sortedPeriods[0];
      var yearAgo = sortedPeriods.find(function(s) {
        return Math.floor(s / 10) === Math.floor(latest / 10) - 1 &&
               (s % 10) === (latest % 10);
      }) || sortedPeriods[1];
      var subset = rows.filter(function(d) {
        return d.period_sort === latest || d.period_sort === yearAgo;
      });
      var latestLabel  = (rows.find(function(d) { return d.period_sort === latest;  }) || {}).period_label || "";
      var yearAgoLabel = (rows.find(function(d) { return d.period_sort === yearAgo; }) || {}).period_label || "";
      var typeOrder = ["Social video", "Other online", "Total online"];
      // Use fx (facet-x) = reach_type, x = period_label so each reach type
      // gets its own facet with the two period bars side by side — matching the screenshot.
      return Plot.plot({
        width: 680,
        height: 320,
        fx: { label: null, domain: typeOrder, padding: 0.2 },
        x:  { label: null, domain: [yearAgoLabel, latestLabel], axis: null },
        y:  { label: "Daily reach %", grid: true, domain: [0, 100] },
        color: {
          legend: true,
          domain: [yearAgoLabel, latestLabel],
          range: ["#2d8653", "#1a5c38"]
        },
        marks: [
          Plot.barY(subset, {
            fx: "reach_type",
            x: "period_label",
            y: "value",
            fill: "period_label",
            tip: true,
            insetLeft: 2,
            insetRight: 2
          }),
          Plot.ruleY([0])
        ],
        marginBottom: 40,
        marginTop: 30
      });
