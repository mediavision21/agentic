description: Daily reach of online video per genre — population-weighted Nordic average
sql: |
  WITH base AS (
    SELECT
      n.period_date,
      n.country,
      CASE n.kpi_detail
        WHEN 'drama_foreign' THEN 'Foreign drama'
        WHEN 'news_debate' THEN 'News and debate'
        WHEN 'factual_documentary' THEN 'Documentaries'
        WHEN 'drama_local' THEN 'Local drama'
        WHEN 'sports_foreign' THEN 'Foreign sports'
      END AS genre,
      n.value AS reach_viewers,
      n.population_1574
    FROM macro.nordic n
    WHERE n.category = 'online_video'
      AND n.kpi_type = 'reach'
      AND n.kpi_dimension = 'genre'
      AND n.kpi_detail IN (
        'drama_foreign',
        'news_debate',
        'factual_documentary',
        'drama_local',
        'sports_foreign'
      )
      AND n.canonical_name IS NULL
      AND n.period_date >= '2022-01-01'
  ),
  genre_reach_country AS (
    SELECT
      period_date,
      country,
      genre,
      SUM(reach_viewers * population_1574) / NULLIF(SUM(population_1574), 0) AS genre_reach_viewers_weighted,
      SUM(population_1574) AS country_population
    FROM base
    GROUP BY period_date, country, genre
  ),
  online_total AS (
    SELECT
      country,
      period_date,
      value AS online_total_reach
    FROM macro.nordic
    WHERE category = 'online_video'
      AND kpi_type = 'reach'
      AND kpi_dimension = 'online_total'
      AND kpi_detail IS NULL
      AND canonical_name IS NULL
      AND age_group = '15-74'
  ),
  genre_reach_population_country AS (
    SELECT
      g.period_date,
      g.country,
      g.genre,
      g.genre_reach_viewers_weighted * ot.online_total_reach AS genre_reach_population,
      g.country_population
    FROM genre_reach_country g
    JOIN online_total ot
      ON g.country = ot.country
     AND g.period_date = ot.period_date
  ),
  genre_reach_population_weighted AS (
    SELECT
      period_date,
      genre,
      SUM(genre_reach_population * country_population)
        / NULLIF(SUM(country_population), 0) AS genre_reach_population_weighted
    FROM genre_reach_population_country
    GROUP BY period_date, genre
  ),
  genre_rank AS (
    SELECT
      genre,
      CASE genre
        WHEN 'Foreign drama' THEN 1
        WHEN 'News and debate' THEN 2
        WHEN 'Documentaries' THEN 3
        WHEN 'Local drama' THEN 4
        WHEN 'Foreign sports' THEN 5
        ELSE 99
      END AS genre_rank
    FROM (
      SELECT DISTINCT genre
      FROM genre_reach_population_weighted
    ) x
  )
  SELECT
    g.period_date,
    g.genre,
    r.genre_rank,
    g.genre_reach_population_weighted * 100 AS value
  FROM genre_reach_population_weighted g
  JOIN genre_rank r
    ON g.genre = r.genre
  ORDER BY r.genre_rank, g.period_date

plots:
  - id: daily_reach_online_video_by_genre
    title: "Daily reach of online video per genre"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          genre_rank: +d.genre_rank,
          value: +d.value,
          period_label: fmtPeriod(d.period_date)
        });
      });

      if (!rows.length) {
        return Plot.plot({
          width: 900,
          height: 220,
          marks: [Plot.text(["No data"], {x: [0], y: [0], text: function(d) { return d; }, fontSize: 18})],
          x: { axis: null },
          y: { axis: null }
        });
      }

      var genres = Array.from(new Set(
        rows.slice().sort(function(a, b) { return a.genre_rank - b.genre_rank; }).map(function(d) { return d.genre; })
      ));
      var periods = Array.from(new Set(
        rows.slice().sort(function(a, b) { return a.period_date < b.period_date ? -1 : 1; }).map(function(d) { return d.period_label; })
      ));

      var greens = ["#d8f3dc", "#b7e4c7", "#95d5b2", "#52b788", "#1b6b4a", "#0f5132"];
      var range = periods.map(function(_, i) { return greens[Math.min(i, greens.length - 1)]; });

      return Plot.plot({
        width: Math.max(980, genres.length * 160),
        height: 430,
        fx: { label: null, domain: genres, padding: 0.18 },
        x: { label: null, domain: periods, axis: null },
        y: {
          label: null,
          grid: true,
          domain: [0, Math.max(40, Math.ceil(Math.max.apply(null, rows.map(function(d) { return d.value; })) / 5) * 5)],
          tickFormat: function(v) { return v + "%"; }
        },
        color: {
          legend: true,
          domain: periods,
          range: range
        },
        marks: [
          Plot.barY(rows, {
            fx: "genre",
            x: "period_label",
            y: "value",
            fill: "period_label",
            tip: true,
            insetLeft: 2,
            insetRight: 2
          }),
          Plot.ruleY([0])
        ],
        marginTop: 20,
        marginBottom: 60,
        marginLeft: 55,
        marginRight: 30
      });
