description: Share of online viewing by genre — population-weighted Nordic average,
  100% stacked
sql: "WITH base_reach AS (\n  SELECT\n    n.period_date,\n    n.country,\n    n.kpi_detail\
  \ AS genre_code,\n    g.genre_label AS genre,\n    n.value AS reach_viewers,\n \
  \   n.population_1574\n  FROM macro.nordic n\n  JOIN macro.dim_genre g\n    ON n.kpi_detail\
  \ = g.genre_code\n  WHERE n.category = 'online_video'\n    AND n.kpi_type = 'reach'\n\
  \    AND n.kpi_dimension = 'genre'\n    AND n.population_segment = 'viewers'\n \
  \   AND n.kpi_detail IN (\n      'drama_foreign',\n      'drama_local',\n      'factual_documentary',\n\
  \      'news_debate',\n      'sports_foreign'\n    )\n    AND n.period_date >= '2022-01-01'\n\
  \    AND EXTRACT(MONTH FROM n.period_date) IN (1)\n    [[ AND {{country}} ]]\n \
  \   [[ AND {{year}} ]]\n    [[ AND {{quarter_label}} ]]\n),\ngenre_reach_country\
  \ AS (\n  SELECT\n    period_date,\n    country,\n    genre_code,\n    genre,\n\
  \    SUM(reach_viewers * population_1574) / NULLIF(SUM(population_1574), 0) AS genre_reach_viewers_weighted,\n\
  \    SUM(population_1574) AS country_population\n  FROM base_reach\n  GROUP BY period_date,\
  \ country, genre_code, genre\n),\nonline_total AS (\n  SELECT\n    n.country,\n\
  \    n.period_date,\n    n.value AS online_total_reach\n  FROM macro.nordic n\n\
  \  WHERE n.category = 'online_video'\n    AND n.kpi_type = 'reach'\n    AND n.kpi_dimension\
  \ = 'online_total'\n    AND n.age_group = '15-74'\n),\ngenre_reach_pop_country AS\
  \ (\n  SELECT\n    g.period_date,\n    g.country,\n    g.genre_code,\n    g.genre,\n\
  \    g.genre_reach_viewers_weighted * ot.online_total_reach AS genre_reach_population,\n\
  \    g.country_population\n  FROM genre_reach_country g\n  JOIN online_total ot\n\
  \    ON g.country = ot.country\n   AND g.period_date = ot.period_date\n),\nbase_vt\
  \ AS (\n  SELECT\n    n.period_date,\n    n.country,\n    n.kpi_detail AS genre_code,\n\
  \    g.genre_label AS genre,\n    n.value AS viewing_time_genre_viewers,\n    n.population_1574\n\
  \  FROM macro.nordic n\n  JOIN macro.dim_genre g\n    ON n.kpi_detail = g.genre_code\n\
  \  WHERE n.category = 'online_video'\n    AND n.kpi_type = 'viewing_time'\n    AND\
  \ n.kpi_dimension = 'genre'\n    AND n.population_segment = 'genre_viewers'\n  \
  \  AND n.canonical_name IS NULL\n    AND n.kpi_detail IN (\n      'drama_foreign',\n\
  \      'drama_local',\n      'factual_documentary',\n      'news_debate',\n    \
  \  'sports_foreign'\n    )\n    AND n.period_date >= '2022-01-01'\n    AND EXTRACT(MONTH\
  \ FROM n.period_date) IN (1)\n    [[ AND {{country}} ]]\n    [[ AND {{year}} ]]\n\
  \    [[ AND {{quarter_label}} ]]\n),\ngenre_vt_country AS (\n  SELECT\n    period_date,\n\
  \    country,\n    genre_code,\n    genre,\n    SUM(viewing_time_genre_viewers *\
  \ population_1574) / NULLIF(SUM(population_1574), 0) AS vt_weighted,\n    SUM(population_1574)\
  \ AS country_population\n  FROM base_vt\n  GROUP BY period_date, country, genre_code,\
  \ genre\n),\ngenre_combined_country AS (\n  SELECT\n    r.period_date,\n    r.country,\n\
  \    r.genre_code,\n    r.genre,\n    r.genre_reach_population * vt.vt_weighted\
  \ AS viewing_time_population,\n    r.country_population\n  FROM genre_reach_pop_country\
  \ r\n  JOIN genre_vt_country vt\n    ON r.country = vt.country\n   AND r.period_date\
  \ = vt.period_date\n   AND r.genre_code = vt.genre_code\n),\ngenre_nordic AS (\n\
  \  SELECT\n    period_date,\n    genre_code,\n    genre,\n    SUM(viewing_time_population\
  \ * country_population)\n      / NULLIF(SUM(country_population), 0) AS viewing_time_population\n\
  \  FROM genre_combined_country\n  GROUP BY period_date, genre_code, genre\n),\n\
  normalized AS (\n  SELECT\n    period_date,\n    genre_code,\n    genre,\n    viewing_time_population,\n\
  \    SUM(viewing_time_population) OVER (PARTITION BY period_date) AS total_selected\n\
  \  FROM genre_nordic\n),\nshares AS (\n  SELECT\n    period_date,\n    genre_code,\n\
  \    genre,\n    (viewing_time_population / NULLIF(total_selected, 0)) AS share\n\
  \  FROM normalized\n),\ngenre_rank AS (\n  SELECT\n    genre_code,\n    ROW_NUMBER()\
  \ OVER (ORDER BY SUM(share) DESC) AS genre_rank_desc\n  FROM shares\n  GROUP BY\
  \ genre_code\n)\nSELECT\n  s.period_date,\n  s.genre,\n  s.share * 100 AS viewing_time_population_share\n\
  FROM shares s\nJOIN genre_rank r\n  ON s.genre_code = r.genre_code\nORDER BY r.genre_rank_desc\
  \ DESC, s.period_date\n"
plots:
- id: share_online_viewing_by_genre
  title: Share of online viewing by genre
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "viewing_time_population_share",
                "fill": "genre",
                "stack": true
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true,
            "domain": [
                0,
                100
            ]
        },
        "color": {
            "legend": true,
            "range": [
                "#1a5c38",
                "#7aafc4",
                "#c05a2c",
                "#52b788",
                "#1b3a2a"
            ]
        }
    }
