category: Viewing - overview
description: Daily reach of social video per service — population-weighted Nordic average, all social video services, grouped by service with one bar per period
sql: |
  WITH weighted AS (
    SELECT
      period_sort,
      period_label,
      year,
      quarter_label,
      canonical_name AS service,
      SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS reach_population
    FROM macro.nordic
    WHERE category           = 'online_video'
      AND kpi_type           = 'reach'
      AND canonical_name     IS NOT NULL
      AND kpi_dimension      IS NULL
      AND age_group          = '15-74'
      AND population_segment IS NULL
      AND quarter            IN (1, 3)
      AND period_sort        >= 20201
      -- Restrict to social video services via a subquery on dim_service
      AND canonical_name IN (
        SELECT canonical_name FROM macro.dim_service WHERE is_social_video = TRUE
      )
    GROUP BY period_sort, period_label, year, quarter_label, canonical_name
  ),
  latest_period AS (
    SELECT MAX(period_sort) AS max_period_sort FROM weighted
  ),
  service_rank AS (
    SELECT service,
           ROW_NUMBER() OVER (ORDER BY reach_population DESC) AS rnk
    FROM weighted
    WHERE period_sort = (SELECT max_period_sort FROM latest_period)
  )
  SELECT
    w.period_sort,
    w.period_label,
    w.year,
    w.quarter_label,
    w.service,
    w.reach_population
  FROM weighted w
  JOIN service_rank sr ON w.service = sr.service
  ORDER BY sr.rnk, w.period_sort

plots:
  - id: daily_reach_social_video_per_service
    title: "Daily reach of social video per service"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          reach_population: +d.reach_population,
          period_sort: +d.period_sort
        });
      });

      // All periods oldest -> newest
      var allPeriods = Array.from(new Set(rows.map(function(d) { return d.period_sort; })))
        .sort(function(a, b) { return a - b });

      // Show 6 most recent periods
      var shownPeriods = allPeriods.slice(-6);
      var shownPeriodLabels = shownPeriods.map(function(ps) {
        return (rows.find(function(d) { return d.period_sort === ps; }) || {}).period_label || String(ps);
      });

      // Filter to shown periods only
      var subset = rows.filter(function(d) {
        return shownPeriods.indexOf(d.period_sort) !== -1;
      });

      // Service order: ranked by reach in the latest period, descending
      var latestPs = shownPeriods[shownPeriods.length - 1];
      var services = subset
        .filter(function(d) { return d.period_sort === latestPs; })
        .slice().sort(function(a, b) { return b.reach_population - a.reach_population })
        .map(function(d) { return d.service; });

      // Green gradient: darkest = oldest, brightest = latest
      var greens = ["#1a5c38", "#1e6b42", "#237a4c", "#2d8f5a", "#38a86b", "#52c985"];
      var colorRange = greens.slice(0, shownPeriods.length);

      var maxY = Math.ceil(
        Math.max.apply(null, subset.map(function(d) { return d.reach_population; })) * 1.12 / 5
      ) * 5;

      return Plot.plot({
        width: Math.max(600, services.length * 130),
        height: 420,
        marginBottom: 50,
        marginLeft: 55,
        marginRight: 20,
        marginTop: 30,
        x: {
          label: null,
          domain: shownPeriodLabels,
          axis: null
        },
        fx: {
          label: null,
          domain: services,
          padding: 0.15
        },
        y: {
          label: null,
          grid: true,
          domain: [0, maxY],
          tickFormat: function(v) { return v + "%"; }
        },
        color: {
          legend: true,
          domain: shownPeriodLabels,
          range: colorRange
        },
        marks: [
          Plot.barY(subset, {
            fx: "service",
            x: "period_label",
            y: "reach_population",
            fill: "period_label",
            tip: true,
            insetLeft: 1,
            insetRight: 1
          }),
          Plot.ruleY([0])
        ]
      });
