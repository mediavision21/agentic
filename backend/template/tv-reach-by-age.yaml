description: TV reach by age group in Norway
sql: |
  SELECT
    period_sort,
    period_label,
    canonical_name AS service,
    SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value
  FROM macro.nordic
  WHERE kpi_type  = 'penetration'
    AND category  = 'tv'
    AND country   = 'sweden'
    AND year      > 2020
    AND quarter   IN (1, 3)
  GROUP BY period_sort, period_label, canonical_name
  ORDER BY period_sort, canonical_name
plots:
  - id: tv_reach_age_trend
    title: "TV reach by age group over time — Norway"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort }) });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) { if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label) } });
      return Plot.plot({
        width: Math.max(800, periods.length * 50),
        marks: [
          Plot.line(rows, { x: "period_label", y: "value", stroke: "age_group", curve: "catmull-rom", tip: true })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "TV reach %", grid: true },
        color: { legend: true },
        marginRight: 100,
        marginBottom: 80
      })

  - id: tv_reach_age_latest
    title: "TV reach by age group — latest period"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort }) });
      var maxSort = Math.max.apply(null, rows.map(function(d) { return d.period_sort }));
      var latest = rows.filter(function(d) { return d.period_sort === maxSort }).sort(function(a, b) { return b.value - a.value });
      var periodLabel = latest.length > 0 ? latest[0].period_label : "";
      return Plot.plot({
        title: periodLabel,
        marks: [
          Plot.barX(latest, { x: "value", y: "age_group", fill: "age_group", sort: { y: "-x" }, tip: true }),
          Plot.text(latest, { x: "value", y: "age_group", text: function(d) { return d.value.toFixed(1) + "%" }, dx: 4, textAnchor: "start", fontSize: 11 }),
          Plot.ruleX([0])
        ],
        x: { label: "TV reach %", grid: true },
        y: { label: null },
        color: { legend: false },
        marginLeft: 80,
        marginRight: 80
      })
