description: Share of viewing time by age group (Social video, Other online video, TV) — population-weighted Nordic average, 100% stacked
sql: |
  WITH reach AS (
    SELECT
      country,
      period_date,
      age_group,
      population_1574,
      CASE
        WHEN category = 'online_video' AND kpi_dimension = 'social' THEN 'Social video'
        WHEN category = 'online_video' AND kpi_dimension = 'online_excluding_social' THEN 'Other online video'
        WHEN category = 'tv' THEN 'TV'
      END AS business_model,
      value AS reach
    FROM macro.nordic
    WHERE canonical_name IS NULL
      AND age_group IN ('15-24', '25-34', '35-44', '45-54', '55-64', '65-74')
      AND (
        (category = 'online_video' AND kpi_type = 'reach' AND kpi_dimension IN ('social', 'online_excluding_social'))
        OR
        (category = 'tv' AND kpi_type = 'reach')
      )
  ),
  viewing_time AS (
    SELECT
      country,
      period_date,
      age_group,
      CASE
        WHEN category = 'online_video' AND kpi_dimension = 'social' THEN 'Social video'
        WHEN category = 'online_video' AND kpi_dimension = 'online_excluding_social' THEN 'Other online video'
        WHEN category = 'tv' THEN 'TV'
      END AS business_model,
      value AS viewing_time_viewers
    FROM macro.nordic
    WHERE canonical_name IS NULL
      AND age_group IN ('15-24', '25-34', '35-44', '45-54', '55-64', '65-74')
      AND (
        (category = 'online_video' AND kpi_type = 'viewing_time' AND kpi_dimension IN ('social', 'online_excluding_social'))
        OR
        (category = 'tv' AND kpi_type = 'viewing_time')
      )
  ),
  agg AS (
    SELECT
      r.period_date,
      r.age_group,
      r.business_model,
      SUM(r.reach * vt.viewing_time_viewers * r.population_1574)
        / NULLIF(SUM(r.population_1574), 0) AS viewing_time_population
    FROM reach r
    JOIN viewing_time vt
      ON r.country = vt.country
     AND r.period_date = vt.period_date
     AND r.age_group = vt.age_group
     AND r.business_model = vt.business_model
    -- population_1574 is always 15-74 individuals regardless of age_group row
    WHERE r.period_date >= '2024-07-01'
      AND EXTRACT(MONTH FROM r.period_date) IN (1, 7)
      AND r.reach IS NOT NULL
      AND vt.viewing_time_viewers IS NOT NULL
    GROUP BY
      r.period_date,
      r.age_group,
      r.business_model
  ),
  normalized AS (
    SELECT
      *,
      SUM(viewing_time_population) OVER (
        PARTITION BY period_date, age_group
      ) AS total_per_period_age
    FROM agg
  )
  SELECT
    period_date,
    age_group,
    CASE age_group
      WHEN '15-24' THEN 1
      WHEN '25-34' THEN 2
      WHEN '35-44' THEN 3
      WHEN '45-54' THEN 4
      WHEN '55-64' THEN 5
      WHEN '65-74' THEN 6
      ELSE 99
    END AS age_sort,
    business_model,
    CASE business_model
      WHEN 'Social video' THEN 1
      WHEN 'Other online video' THEN 2
      WHEN 'TV' THEN 3
      ELSE 99
    END AS series_order,
    (viewing_time_population / NULLIF(total_per_period_age, 0)) * 100.0 AS viewing_time_population_share_pct
  FROM normalized
  ORDER BY period_date, age_sort, series_order

plots:
  - id: viewing_time_share_by_age_group
    title: "Share of viewing time"
    code: |
      function fmtPeriod(s) { var d=new Date(s); return 'Q'+Math.ceil((d.getUTCMonth()+1)/3)+' '+d.getUTCFullYear(); }
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          age_sort: +d.age_sort,
          series_order: +d.series_order,
          share: +d.viewing_time_population_share_pct,
          period_label: fmtPeriod(d.period_date)
        });
      });

      if (!rows.length) {
        return Plot.plot({
          width: 700,
          height: 220,
          marks: [Plot.text(["No data"], {x: [0], y: [0], text: function(d) { return d; }, fontSize: 18})],
          x: { axis: null },
          y: { axis: null }
        });
      }

      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_date; }))).sort();
      var latest = sortedPeriods[sortedPeriods.length - 1];
      var latestD = new Date(latest); var yearAgoD = new Date(latestD); yearAgoD.setUTCFullYear(yearAgoD.getUTCFullYear() - 1);
      var yearAgo = yearAgoD.toISOString().slice(0, 10);

      var latestLabel = fmtPeriod(latest);
      var yearAgoLabel = fmtPeriod(yearAgo);
      var periodOrder = Array.from(new Set([yearAgoLabel, latestLabel].filter(Boolean)));
      var ageOrder = ["15-24", "25-34", "35-44", "45-54", "55-64", "65-74"];
      var stackOrder = ["TV", "Other online video", "Social video"];

      var subset = rows.filter(function(d) {
        return d.period_date === latest || d.period_date === yearAgo;
      });

      var xOrder = [];
      periodOrder.forEach(function(period) {
        ageOrder.forEach(function(age) {
          xOrder.push(period + "\n" + age);
        });
      });

      var stackedRows = [];
      var totals = [];
      periodOrder.forEach(function(period) {
        ageOrder.forEach(function(age) {
          var xLabel = period + "\n" + age;
          var cum = 0;
          stackOrder.forEach(function(model) {
            var row = subset.find(function(d) {
              return d.period_label === period && d.age_group === age && d.business_model === model;
            });
            var v = row ? row.share : 0;
            stackedRows.push({
              x: xLabel,
              business_model: model,
              y1: cum,
              y2: cum + v,
              mid: cum + v / 2,
              share: v
            });
            cum += v;
          });
          totals.push({ x: xLabel, total: cum });
        });
      });

      return Plot.plot({
        width: 720,
        height: 520,
        x: { label: null, domain: xOrder, tickRotate: -90 },
        y: {
          label: null,
          grid: false,
          domain: [0, 100],
          ticks: 5,
          tickFormat: function(v) { return v + "%"; }
        },
        color: {
          legend: true,
          domain: ["Social video", "Other online video", "TV"],
          range: ["#d9dcdf", "#9a9895", "#2b2a29"]
        },
        marks: [
          Plot.barY(stackedRows, {
            x: "x",
            y1: "y1",
            y2: "y2",
            fill: "business_model",
            insetLeft: 6,
            insetRight: 6,
            tip: true,
            title: function(d) { return d.business_model + ": " + d.share.toFixed(1) + "%"; }
          }),
          Plot.text(
            totals.filter(function(d, i) { return i === 0 || i === ageOrder.length; }),
            {
              x: "x",
              y: 100,
              text: function() { return "100%"; },
              fontSize: 16,
              fontWeight: "bold",
              fill: "#3d4952",
              dy: -10
            }
          ),
          Plot.ruleY([0])
        ],
        marginTop: 50,
        marginBottom: 130,
        marginLeft: 50,
        marginRight: 20
      });
