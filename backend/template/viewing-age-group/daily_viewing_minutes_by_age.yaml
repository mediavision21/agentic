description: Daily viewing minutes of video by age group (Social video, Other online
  video, TV) — population-weighted Nordic average
sql: "WITH reach AS (\n  SELECT\n    country,\n    period_date,\n    age_group,\n\
  \    population_1574,\n    CASE\n      WHEN category = 'online_video' AND kpi_dimension\
  \ = 'social' THEN 'Social video'\n      WHEN category = 'online_video' AND kpi_dimension\
  \ = 'online_excluding_social' THEN 'Other online video'\n      WHEN category = 'tv'\
  \ THEN 'TV'\n    END AS business_model,\n    value AS reach\n  FROM macro.nordic\n\
  \  WHERE canonical_name IS NULL\n    AND age_group IN ('15-24', '25-34', '35-44',\
  \ '45-54', '55-64', '65-74')\n    AND (\n      (\n        category = 'online_video'\n\
  \        AND kpi_type = 'reach'\n        AND kpi_dimension IN ('social', 'online_excluding_social')\n\
  \      )\n      OR (\n        category = 'tv'\n        AND kpi_type = 'reach'\n\
  \      )\n    )\n),\nviewing_time AS (\n  SELECT\n    country,\n    period_date,\n\
  \    age_group,\n    CASE\n      WHEN category = 'online_video' AND kpi_dimension\
  \ = 'social' THEN 'Social video'\n      WHEN category = 'online_video' AND kpi_dimension\
  \ = 'online_excluding_social' THEN 'Other online video'\n      WHEN category = 'tv'\
  \ THEN 'TV'\n    END AS business_model,\n    value AS viewing_time_viewers\n  FROM\
  \ macro.nordic\n  WHERE canonical_name IS NULL\n    AND age_group IN ('15-24', '25-34',\
  \ '35-44', '45-54', '55-64', '65-74')\n    AND (\n      (\n        category = 'online_video'\n\
  \        AND kpi_type = 'viewing_time'\n        AND kpi_dimension IN ('social',\
  \ 'online_excluding_social')\n      )\n      OR (\n        category = 'tv'\n   \
  \     AND kpi_type = 'viewing_time'\n      )\n    )\n),\nagg AS (\n  SELECT\n  \
  \  r.period_date,\n    r.age_group,\n    r.business_model,\n    SUM(r.reach * vt.viewing_time_viewers\
  \ * r.population_1574)\n      / NULLIF(SUM(r.population_1574), 0) AS viewing_time_population\n\
  \  FROM reach r\n  JOIN viewing_time vt\n    ON r.country = vt.country\n   AND r.period_date\
  \ = vt.period_date\n   AND r.age_group = vt.age_group\n   AND r.business_model =\
  \ vt.business_model\n  -- population_1574 is always 15-74 individuals regardless\
  \ of age_group row\n  WHERE r.period_date >= '2024-07-01'\n    AND EXTRACT(MONTH\
  \ FROM r.period_date) IN (1, 7)\n  GROUP BY\n    r.period_date,\n    r.age_group,\n\
  \    r.business_model\n)\nSELECT\n  period_date,\n  age_group,\n  CASE age_group\n\
  \    WHEN '15-24' THEN 1\n    WHEN '25-34' THEN 2\n    WHEN '35-44' THEN 3\n   \
  \ WHEN '45-54' THEN 4\n    WHEN '55-64' THEN 5\n    WHEN '65-74' THEN 6\n    ELSE\
  \ 99\n  END AS age_sort,\n  business_model,\n  CASE business_model\n    WHEN 'Social\
  \ video' THEN 1\n    WHEN 'Other online video' THEN 2\n    WHEN 'TV' THEN 3\n  \
  \  ELSE 99\n  END AS series_order,\n  viewing_time_population\nFROM agg\nORDER BY\
  \ period_date, age_sort, series_order\n"
plots:
- id: daily_viewing_minutes_by_age
  title: Daily viewing minutes of video
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "viewing_time_population",
                "fill": "business_model",
                "fx": "age_group",
                "stack": true
            }
        ],
        "fx": {
            "label": null,
            "domain": [
                "15-24",
                "25-34",
                "35-44",
                "45-54",
                "55-64",
                "65-74"
            ],
            "padding": 0.2
        },
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "Social video",
                "Other online video",
                "TV"
            ],
            "range": [
                "#d8f3dc",
                "#95d5b2",
                "#083d2b"
            ]
        }
    }
