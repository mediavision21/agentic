description: Daily viewing minutes of video by age group (Social video, Other online
  video, TV) — population-weighted Nordic average
sql: |-
    WITH reach AS (
      SELECT
        country,
        period_date,
        age_group,
        population_1574,
        CASE
          WHEN category = 'online_video' AND kpi_dimension = 'social' THEN 'Social video'
          WHEN category = 'online_video' AND kpi_dimension = 'online_excluding_social' THEN 'Other online video'
          WHEN category = 'tv' THEN 'TV'
        END AS business_model,
        value AS reach
      FROM macro.nordic
      WHERE canonical_name IS NULL
        AND age_group IN ('15-24', '25-34', '35-44', '45-54', '55-64', '65-74')
        AND (
          (
            category = 'online_video'
            AND kpi_type = 'reach'
            AND kpi_dimension IN ('social', 'online_excluding_social')
          )
          OR (
            category = 'tv'
            AND kpi_type = 'reach'
          )
        )
    ),
    viewing_time AS (
      SELECT
        country,
        period_date,
        age_group,
        CASE
          WHEN category = 'online_video' AND kpi_dimension = 'social' THEN 'Social video'
          WHEN category = 'online_video' AND kpi_dimension = 'online_excluding_social' THEN 'Other online video'
          WHEN category = 'tv' THEN 'TV'
        END AS business_model,
        value AS viewing_time_viewers
      FROM macro.nordic
      WHERE canonical_name IS NULL
        AND age_group IN ('15-24', '25-34', '35-44', '45-54', '55-64', '65-74')
        AND (
          (
            category = 'online_video'
            AND kpi_type = 'viewing_time'
            AND kpi_dimension IN ('social', 'online_excluding_social')
          )
          OR (
            category = 'tv'
            AND kpi_type = 'viewing_time'
          )
        )
    ),
    agg AS (
      SELECT
        r.period_date,
        r.age_group,
        r.business_model,
        SUM(r.reach * vt.viewing_time_viewers * r.population_1574)
          / NULLIF(SUM(r.population_1574), 0) AS viewing_time_population
      FROM reach r
      JOIN viewing_time vt
        ON r.country = vt.country
       AND r.period_date = vt.period_date
       AND r.age_group = vt.age_group
       AND r.business_model = vt.business_model
      -- population_1574 is always 15-74 individuals regardless of age_group row
      WHERE r.period_date >= '2024-07-01'
        AND EXTRACT(MONTH FROM r.period_date) IN (1, 7)
      GROUP BY
        r.period_date,
        r.age_group,
        r.business_model
    )
    SELECT
      period_date,
      age_group,
      CASE age_group
        WHEN '15-24' THEN 1
        WHEN '25-34' THEN 2
        WHEN '35-44' THEN 3
        WHEN '45-54' THEN 4
        WHEN '55-64' THEN 5
        WHEN '65-74' THEN 6
        ELSE 99
      END AS age_sort,
      business_model,
      CASE business_model
        WHEN 'Social video' THEN 1
        WHEN 'Other online video' THEN 2
        WHEN 'TV' THEN 3
        ELSE 99
      END AS series_order,
      viewing_time_population
    FROM agg
    ORDER BY period_date, age_sort, series_order
plots:
- id: daily_viewing_minutes_by_age
  title: Daily viewing minutes of video
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "viewing_time_population",
                "fill": "business_model",
                "fx": "age_group",
                "stack": true
            }
        ],
        "fx": {
            "label": null,
            "domain": [
                "15-24",
                "25-34",
                "35-44",
                "45-54",
                "55-64",
                "65-74"
            ],
            "padding": 0.2
        },
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "Social video",
                "Other online video",
                "TV"
            ],
            "range": [
                "#d8f3dc",
                "#95d5b2",
                "#083d2b"
            ]
        }
    }
