description: Daily viewing minutes of video averaged across age groups (Social video, Other online video, TV) — population-weighted Nordic average
sql: |
  WITH population AS (
    SELECT
      CASE country
        WHEN 'dk' THEN 'denmark'
        WHEN 'fi' THEN 'finland'
        WHEN 'no' THEN 'norway'
        WHEN 'se' THEN 'sweden'
        ELSE country
      END AS country,
      year,
      value AS population_15_74
    FROM macro.fact_population
    WHERE population_type = 'individuals'
      AND age = '15-74'
  ),
  reach AS (
    SELECT
      country,
      year,
      quarter,
      period_sort,
      period_label,
      age_group,
      CASE
        WHEN category = 'online_video' AND kpi_dimension = 'social' THEN 'Social video'
        WHEN category = 'online_video' AND kpi_dimension = 'online_excluding_social' THEN 'Other online video'
        WHEN category = 'tv' THEN 'TV'
      END AS business_model,
      value AS reach
    FROM macro.nordic
    WHERE canonical_name IS NULL
      AND population_segment IS NULL
      AND age_group IN ('15-24', '25-34', '35-44', '45-54', '55-64', '65-74')
      AND (
        (category = 'online_video' AND kpi_type = 'reach' AND kpi_dimension IN ('social', 'online_excluding_social'))
        OR
        (category = 'tv' AND kpi_type = 'reach')
      )
  ),
  viewing_time AS (
    SELECT
      country,
      year,
      quarter,
      period_sort,
      period_label,
      age_group,
      CASE
        WHEN category = 'online_video' AND kpi_dimension = 'social' THEN 'Social video'
        WHEN category = 'online_video' AND kpi_dimension = 'online_excluding_social' THEN 'Other online video'
        WHEN category = 'tv' THEN 'TV'
      END AS business_model,
      value AS viewing_time_viewers
    FROM macro.nordic
    WHERE canonical_name IS NULL
      AND population_segment = 'viewers'
      AND age_group IN ('15-24', '25-34', '35-44', '45-54', '55-64', '65-74')
      AND (
        (category = 'online_video' AND kpi_type = 'viewing_time' AND kpi_dimension IN ('social', 'online_excluding_social'))
        OR
        (category = 'tv' AND kpi_type = 'viewing_time')
      )
  ),
  agg_age AS (
    SELECT
      r.period_sort,
      r.period_label,
      r.age_group,
      r.business_model,
      SUM(r.reach * vt.viewing_time_viewers * pop.population_15_74)
        / NULLIF(SUM(pop.population_15_74), 0) AS viewing_time_population
    FROM reach r
    JOIN viewing_time vt
      ON r.country = vt.country
     AND r.year = vt.year
     AND r.quarter = vt.quarter
     AND r.age_group = vt.age_group
     AND r.business_model = vt.business_model
    JOIN population pop
      ON r.country = pop.country
     AND r.year = pop.year
    WHERE r.period_sort >= 20243
      AND r.quarter IN (1, 3)
      AND r.reach IS NOT NULL
      AND vt.viewing_time_viewers IS NOT NULL
    GROUP BY
      r.period_sort,
      r.period_label,
      r.age_group,
      r.business_model
  ),
  agg AS (
    SELECT
      period_sort,
      period_label,
      business_model,
      AVG(viewing_time_population) AS viewing_time_population
    FROM agg_age
    GROUP BY
      period_sort,
      period_label,
      business_model
  )
  SELECT
    period_sort,
    period_label,
    business_model,
    CASE business_model
      WHEN 'Social video' THEN 1
      WHEN 'Other online video' THEN 2
      WHEN 'TV' THEN 3
      ELSE 99
    END AS series_order,
    viewing_time_population
  FROM agg
  ORDER BY period_sort, series_order

plots:
  - id: daily_viewing_minutes_age_group_average
    title: "Daily viewing minutes of video"
    code: |
      var rows = data.map(function(d) {
        return Object.assign({}, d, {
          value: +d.viewing_time_population,
          period_sort: +d.period_sort,
          series_order: +d.series_order
        });
      });

      if (!rows.length) {
        return Plot.plot({
          width: 900,
          height: 220,
          marks: [Plot.text(["No data"], {x: [0], y: [0], text: function(d) { return d; }, fontSize: 18})],
          x: { axis: null },
          y: { axis: null }
        });
      }

      var sortedPeriods = Array.from(new Set(rows.map(function(d) { return d.period_sort; })))
        .sort(function(a, b) { return b - a; });
      var latest = sortedPeriods[0];
      var yearAgo = sortedPeriods.find(function(s) {
        return Math.floor(s / 10) === Math.floor(latest / 10) - 1 &&
               (s % 10) === (latest % 10);
      }) || sortedPeriods[1] || sortedPeriods[0];

      var subset = rows.filter(function(d) {
        return d.period_sort === latest || d.period_sort === yearAgo;
      });

      var latestLabel = (rows.find(function(d) { return d.period_sort === latest; }) || {}).period_label || "";
      var yearAgoLabel = (rows.find(function(d) { return d.period_sort === yearAgo; }) || {}).period_label || "";
      var periodOrder = Array.from(new Set([yearAgoLabel, latestLabel].filter(Boolean)));
      var typeOrder = ["Social video", "Other online video", "TV"];

      return Plot.plot({
        width: 980,
        height: 420,
        fx: { label: null, domain: typeOrder, padding: 0.22 },
        x: { label: null, domain: periodOrder, axis: null },
        y: { label: null, grid: true },
        color: {
          legend: true,
          domain: periodOrder,
          range: ["#2d8653", "#1a5c38"]
        },
        marks: [
          Plot.barY(subset, {
            fx: "business_model",
            x: "period_label",
            y: "value",
            fill: "period_label",
            tip: true,
            insetLeft: 3,
            insetRight: 3
          }),
          Plot.text(subset, {
            fx: "business_model",
            x: "period_label",
            y: "value",
            text: function(d) { return Math.round(d.value) + " min"; },
            dy: -12,
            fontSize: 13,
            fontWeight: "bold",
            fill: "#3d4952"
          }),
          Plot.ruleY([0])
        ],
        marginTop: 35,
        marginBottom: 45
      });
