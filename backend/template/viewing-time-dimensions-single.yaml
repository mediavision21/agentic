description: online viewing time by dimension (social vs other online) in Norway
sql: |
  SELECT
    period_sort,
    period_label,
    kpi_dimension AS dimension,
    AVG(value) AS value
  FROM macro.nordic
  WHERE kpi_type      = 'viewing_time'
    AND category      = 'online_video'
    AND kpi_dimension IN ('ssvod', 'bsvod')
    AND country       = 'norway'
    AND age_group     = '15-74'
    AND year          > 2020
    AND quarter       IN (1, 3)
  GROUP BY period_sort, period_label, kpi_dimension
  ORDER BY period_sort
plots:
  - id: vt_dims_trend
    title: "Online viewing time by dimension — Norway"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort }) });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) { if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label) } });
      return Plot.plot({
        width: Math.max(800, periods.length * 50),
        marks: [
          Plot.line(rows, { x: "period_label", y: "value", stroke: "dimension", curve: "catmull-rom", tip: true }),
          Plot.dot(rows, { x: "period_label", y: "value", fill: "dimension", r: 3 })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Min/day", grid: true },
        color: { legend: true },
        marginRight: 200,
        marginBottom: 80
      })
