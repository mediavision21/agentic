description: online video reach by country and age group combined
sql: |
  SELECT
    period_sort,
    period_label,
    country || ' · ' || kpi_dimension AS series,
    SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value
  FROM macro.nordic
  WHERE kpi_type      = 'reach'
    AND category      = 'online_video'
    AND kpi_dimension IN ('ssvod', 'bsvod')
    AND age_group     = '15-74'
    AND year          > 2020
    AND quarter       IN (1, 3)
  GROUP BY period_sort, period_label, country, kpi_dimension
  ORDER BY period_sort, series
plots:
  - id: composite_reach_trend
    title: "Online reach by country × age group over time"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value, period_sort: +d.period_sort }) });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) { if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label) } });
      return Plot.plot({
        width: Math.max(900, periods.length * 50),
        marks: [
          Plot.line(rows, { x: "period_label", y: "value", stroke: "series", curve: "catmull-rom", tip: true })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: "Reach %", grid: true },
        color: { legend: true },
        marginRight: 200,
        marginBottom: 80
      })
