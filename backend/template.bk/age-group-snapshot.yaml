description: online video viewing time by age group latest snapshot (Nordic)
sql: |
  SELECT
    period_sort,
    period_label,
    country,
    AVG(value) AS value
  FROM macro.nordic
  WHERE kpi_type          = 'spend'
    AND category          = 'tv'
    AND population_segment = 'subscribers'
    AND year              >= 2022
    AND quarter           IN (1, 3)
  GROUP BY period_sort, period_label, country
  ORDER BY period_sort, country
plots:
  - id: age_snapshot_bar
    title: "Online viewing time by age group (latest snapshot)"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value }) }).sort(function(a, b) { return b.value - a.value });
      return Plot.plot({
        marks: [
          Plot.barX(rows, { x: "value", y: "age_group", fill: "steelblue", sort: { y: "-x" }, tip: true }),
          Plot.text(rows, { x: "value", y: "age_group", text: function(d) { return d.value.toFixed(1) + " min" }, dx: 4, textAnchor: "start", fontSize: 11 }),
          Plot.ruleX([0])
        ],
        x: { label: "Min/day", grid: true },
        y: { label: "Age group" },
        marginLeft: 80,
        marginRight: 80
      })
