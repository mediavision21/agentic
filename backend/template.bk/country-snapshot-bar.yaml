description: latest online viewing time per country (bar chart)
sql: |
  SELECT
    period_sort,
    period_label,
    country,
    AVG(value) AS value
  FROM macro.nordic
  WHERE kpi_type      = 'viewing_time'
    AND category      = 'online_video'
    AND kpi_dimension IS NULL
    AND year          >= 2022
    AND quarter       IN (1, 3)
  GROUP BY period_sort, period_label, country
  ORDER BY period_sort, country
plots:
  - id: country_snapshot
    title: "Online viewing time by country (latest)"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value }) }).sort(function(a, b) { return b.value - a.value });
      return Plot.plot({
        marks: [
          Plot.barX(rows, { x: "value", y: "country", fill: "country", sort: { y: "-x" }, tip: true }),
          Plot.text(rows, { x: "value", y: "country", text: function(d) { return d.value.toFixed(1) + " min" }, dx: 4, textAnchor: "start", fontSize: 11 }),
          Plot.ruleX([0])
        ],
        x: { label: "Min/day", grid: true },
        y: { label: null },
        color: { legend: false },
        marginLeft: 100,
        marginRight: 80
      })
