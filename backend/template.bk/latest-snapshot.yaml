description: latest SVOD reach snapshot per country
sql: |
  SELECT
    period_sort,
    period_label,
    country,
    ROUND(SUM(value * population) / NULLIF(SUM(population), 0) * 100, 1) AS value
  FROM macro.nordic
  WHERE kpi_type  = 'reach'
    AND category  = 'online_video'
    AND year      >= 2022
    AND quarter   IN (1, 3)
  GROUP BY period_sort, period_label, country
  ORDER BY period_sort, country
plots:
  - id: latest_snapshot_bar
    title: "Latest SVOD reach by country"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value }) }).sort(function(a, b) { return b.value - a.value });
      var dateLabel = rows.length > 0 ? rows[0].date : "";
      return Plot.plot({
        title: dateLabel,
        marks: [
          Plot.barX(rows, { x: "value", y: "country", fill: "country", sort: { y: "-x" }, tip: true }),
          Plot.text(rows, { x: "value", y: "country", text: function(d) { return d.value.toFixed(1) + "%" }, dx: 4, textAnchor: "start", fontSize: 11 }),
          Plot.ruleX([0])
        ],
        x: { label: "SVOD reach %", grid: true },
        y: { label: null },
        color: { legend: false },
        marginLeft: 100,
        marginRight: 80
      })
