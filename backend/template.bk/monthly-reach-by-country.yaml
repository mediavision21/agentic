description: reach online video by country
sql: |
  SELECT
    period_sort,
    period_label,
    country,
    SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS reach
  FROM macro.nordic
  WHERE kpi_type        = 'reach'
    AND category    = 'online_video'
    AND quarter     IN (1, 3)
    AND year        > 2020
  GROUP BY period_sort, period_label, country
  ORDER BY period_sort, country

plots:
  - id: reach_by_country_trend
    title: " reach by country over time"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { reach: +d.reach, period_sort: +d.period_sort }) });
      var periods = [];
      var seen = {};
      rows.slice().sort(function(a, b) { return a.period_sort - b.period_sort }).forEach(function(d) { if (!seen[d.period_label]) { seen[d.period_label] = true; periods.push(d.period_label) } });
      return Plot.plot({
        width: Math.max(800, periods.length * 50),
        marks: [
          Plot.line(rows, { x: "period_label", y: "reach", stroke: "country", curve: "catmull-rom", tip: true }),
          Plot.dot(rows, { x: "period_label", y: "reach", fill: "country", r: 3 })
        ],
        x: { label: null, domain: periods, tickRotate: -45 },
        y: { label: " reach %", grid: true },
        color: { legend: true },
        marginRight: 120,
        marginBottom: 80
      })

  - id: reach_latest_bar
    title: " reach — latest period by country"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { reach: +d.reach, period_sort: +d.period_sort }) });
      var maxSort = Math.max.apply(null, rows.map(function(d) { return d.period_sort }));
      var latest = rows.filter(function(d) { return d.period_sort === maxSort }).sort(function(a, b) { return b.reach - a.reach });
      var periodLabel = latest.length > 0 ? latest[0].period_label : "";
      return Plot.plot({
        title: periodLabel,
        marks: [
          Plot.barX(latest, { x: "reach", y: "country", fill: "country", sort: { y: "-x" }, tip: true }),
          Plot.text(latest, { x: "reach", y: "country", text: function(d) { return d.reach.toFixed(1) + "%" }, dx: 4, textAnchor: "start", fontSize: 11 }),
          Plot.ruleX([0])
        ],
        x: { label: " reach %", grid: true },
        y: { label: null },
        color: { legend: false },
        marginLeft: 100,
        marginRight: 60
      })
