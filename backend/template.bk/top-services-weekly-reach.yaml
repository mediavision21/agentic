description: top streaming services by Nordic population-weighted weekly reach (latest)
sql: |
  WITH latest AS (
    SELECT country, MAX(date) AS date
    FROM macro.nordic
    WHERE kpi_type = 'reach_service_weekly' AND category = 'online_video'
    GROUP BY country
  )
  SELECT
    n.canonical_name AS service,
    ROUND(SUM(n.value * n.population) / NULLIF(SUM(n.population), 0) * 100) AS value
  FROM macro.nordic n
  JOIN latest l ON n.country = l.country AND n.date = l.date
  WHERE n.kpi_type      = 'reach_service_weekly'
    AND n.category      = 'online_video'
    AND n.canonical_name IS NOT NULL
    AND n.age_group     = '15-74'
  GROUP BY n.canonical_name
  ORDER BY value DESC
  LIMIT 15

plots:
  - id: top_services_bar
    title: "Top 15 services by weekly reach (Nordic, latest)"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value }) });
      return Plot.plot({
        marks: [
          Plot.barX(rows, { x: "value", y: "service", fill: "steelblue", sort: { y: "-x" }, tip: true }),
          Plot.text(rows, { x: "value", y: "service", text: function(d) { return d.value.toFixed(0) + "%" }, dx: 4, textAnchor: "start", fontSize: 10 }),
          Plot.ruleX([0])
        ],
        x: { label: "Weekly reach %", grid: true },
        y: { label: null },
        marginLeft: 140,
        marginRight: 80
      })
