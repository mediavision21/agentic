description: latest SVOD reach value for a single country (Norway, 2024)
sql: |
  SELECT
    country,
    period_label,
    SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value
  FROM macro.nordic
  WHERE kpi_type      = 'reach'
    AND category      = 'online_video'
    AND kpi_dimension = 'ssvod'
    AND year          = 2025
    AND quarter       IN (1, 3)
  GROUP BY country, period_sort, period_label
  ORDER BY country, period_sort
plots:
  - id: single_latest_value
    title: "Latest SVOD reach — Norway 2024"
    code: |
      var rows = data.map(function(d) { return Object.assign({}, d, { value: +d.value }) });
      var row = rows[0];
      return Plot.plot({
        title: row ? row.period_label : "",
        marks: [
          Plot.barX(rows, { x: "value", y: "period_label", fill: "steelblue", tip: true }),
          Plot.text(rows, { x: "value", y: "period_label", text: function(d) { return d.value.toFixed(1) + "%" }, dx: 4, textAnchor: "start", fontSize: 14 }),
          Plot.ruleX([0])
        ],
        x: { label: "SVOD reach %", grid: true },
        y: { label: null },
        marginLeft: 80,
        marginRight: 80
      })
