description: Household penetration of Illegal IPTV — household-weighted Nordic average
  trend
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: |-
    SELECT
        n.period_date,
        'Illegal IPTV' AS business_model,
        SUM(n.value * n.population_household)
            / NULLIF(SUM(n.population_household), 0) * 100 AS value
    FROM macro.nordic n
    WHERE
        n.category = 'tv'
        AND n.kpi_type = 'penetration'
        AND n.kpi_dimension = 'illegal_iptv'
        AND n.canonical_name IS NULL
        AND n.age_group = '15-74'
        AND n.value IS NOT NULL
        [[ AND {{country}} ]]
        [[ AND {{year}} ]]
        [[ AND {{quarter_label}} ]]
    GROUP BY n.period_date
    ORDER BY n.period_date
plots:
- id: illegal_iptv_penetration
  title: 'Household penetration: Illegal IPTV'
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_date",
                "y": "value",
                "stroke": "#1a5c38",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_date",
                "y": "value",
                "fill": "white",
                "stroke": "#1a5c38"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        }
    }
