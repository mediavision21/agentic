description: Household penetration by video type (SVOD, SSVOD, BSVOD, HVOD, Pay TV channel, TVE) across Nordic countries
sql: |-
    WITH base AS (
        SELECT
            n.period_date,
            n.country,
            n.kpi_dimension,
            n.value AS penetration_country,
            n.population_household
        FROM macro.nordic n
        WHERE
            n.category IN ('online_video', 'tv')
            AND n.kpi_type = 'penetration'
            AND n.kpi_dimension IN (
                'svod',
                'ssvod',
                'bsvod',
                'hvod',
                'tve',
                'pay_tv_channel'
            )
            AND n.age_group = '15-74'
            AND (
                (
                    n.kpi_dimension IN ('svod', 'ssvod', 'bsvod')
                    AND n.period_date >= '2016-01-01'
                )
                OR (
                    n.kpi_dimension = 'hvod'
                    AND n.period_date >= '2022-07-01'
                )
                OR n.kpi_dimension = 'tve'
                OR n.kpi_dimension = 'pay_tv_channel'
            )
            AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
            [[ AND {{country}} ]]
            [[ AND {{year}} ]]
            [[ AND {{quarter_label}} ]]
    )
    SELECT
        period_date,
        UPPER(kpi_dimension) AS business_model,
        SUM(penetration_country * population_household)
            / NULLIF(SUM(population_household), 0) * 100 AS value
    FROM base
    GROUP BY
        period_date,
        kpi_dimension
    ORDER BY
        period_date,
        business_model;
plots:
- id: household_penetration_trend
  title: Household penetration by video type — trend
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_date",
                "y": "value",
                "stroke": "business_model",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_date",
                "y": "value",
                "fill": "white",
                "stroke": "business_model"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Household penetration %",
            "grid": true,
            "domain": [
                0,
                100
            ]
        },
        "color": {
            "legend": true,
            "domain": [
                "SVOD",
                "SSVOD",
                "BSVOD",
                "HVOD",
                "PAY_TV_CHANNEL",
                "TVE"
            ],
            "range": [
                "#1a5c38",
                "#b83c26",
                "#d4a017",
                "#c9a0dc",
                "#111111",
                "#cccccc"
            ]
        }
    }
- id: household_penetration_compare
  title: Household penetration by video type — latest vs year-ago
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_date",
                "y": "value",
                "fill": "period_date",
                "fx": "business_model"
            }
        ],
        "fx": {
            "label": null,
            "domain": [
                "SVOD",
                "SSVOD",
                "BSVOD",
                "HVOD",
                "PAY_TV_CHANNEL",
                "TVE"
            ],
            "padding": 0.2
        },
        "x": {
            "label": null,
            "axis": null
        },
        "y": {
            "label": "Household penetration %",
            "grid": true,
            "domain": [
                0,
                100
            ]
        },
        "color": {
            "legend": true,
            "scheme": "greens"
        }
    }
