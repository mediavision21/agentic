description: Average number of SVOD subscriptions among subscribing households — household-weighted
  Nordic average
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: |-
    SELECT
        n.period_date,
        SUM(n.value * n.population_household)
            / NULLIF(SUM(n.population_household), 0) AS value
    FROM macro.nordic n
    WHERE
        n.category = 'online_video'
        AND n.kpi_type = 'stacking'
        AND n.kpi_dimension = 'svod'
        AND n.population_segment = 'subscribers'
        AND n.age_group = '15-74'
        AND n.canonical_name IS NULL
        AND n.kpi_detail IS NULL
        AND n.value IS NOT NULL
        [[ AND {{country}} ]]
        [[ AND {{year}} ]]
        [[ AND {{quarter_label}} ]]
    GROUP BY n.period_date
    ORDER BY n.period_date
plots:
- id: svod_stacking
  title: SVOD stacking
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_date",
                "y": "value",
                "fill": "#1a5c38"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": null,
            "grid": true
        }
    }
