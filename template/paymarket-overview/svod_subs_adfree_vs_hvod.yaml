description: Number of SVOD subscriptions (millions) split into Ad-free and HVOD —
  Nordic total
filters:
  quarter_label:
    choices:
    - Q1
    default:
    - Q1
sql: |-
    WITH svod AS (
        SELECT n.country, n.period_date,
               n.value AS penetration_svod, n.population_household
        FROM macro.nordic n
        WHERE n.category = 'online_video'
          AND n.kpi_type = 'penetration'
          AND n.kpi_dimension = 'svod'
          AND n.canonical_name IS NULL
          AND n.age_group = '15-74'
          AND n.value IS NOT NULL
          [[ AND {{country}} ]]
          [[ AND {{year}} ]]
          [[ AND {{quarter_label}} ]]
    ),
    svod_stacking AS (
        SELECT n.country, n.period_date, n.value AS stacking_svod
        FROM macro.nordic n
        WHERE n.category = 'online_video'
          AND n.kpi_type = 'stacking'
          AND n.kpi_dimension = 'svod'
          AND n.population_segment = 'subscribers'
          AND n.canonical_name IS NULL
          AND n.age_group = '15-74'
          AND n.value IS NOT NULL
    ),
    hvod AS (
        SELECT n.country, n.period_date, n.value AS penetration_hvod
        FROM macro.nordic n
        WHERE n.category = 'online_video'
          AND n.kpi_type = 'penetration'
          AND n.kpi_dimension = 'hvod'
          AND n.canonical_name IS NULL
          AND n.age_group = '15-74'
          AND n.value IS NOT NULL
    ),
    hvod_stacking AS (
        SELECT n.country, n.period_date, n.value AS stacking_hvod
        FROM macro.nordic n
        WHERE n.category = 'online_video'
          AND n.kpi_type = 'stacking'
          AND n.kpi_dimension = 'hvod'
          AND n.population_segment = 'subscribers'
          AND n.canonical_name IS NULL
          AND n.age_group = '15-74'
          AND n.value IS NOT NULL
    ),
    base AS (
        SELECT
            sv.period_date,
            sv.country,
            sv.penetration_svod * svs.stacking_svod * sv.population_household AS svod_subs,
            hv.penetration_hvod * hvs.stacking_hvod * sv.population_household AS hvod_subs
        FROM svod sv
        JOIN svod_stacking svs
          ON sv.country = svs.country AND sv.period_date = svs.period_date
        JOIN hvod hv
          ON sv.country = hv.country AND sv.period_date = hv.period_date
        JOIN hvod_stacking hvs
          ON sv.country = hvs.country AND sv.period_date = hvs.period_date
        WHERE sv.period_date >= '2024-07-01'
    ),
    agg AS (
        SELECT
            period_date,
            SUM(hvod_subs) AS hvod_total,
            SUM(svod_subs - hvod_subs) AS adfree_total
        FROM base
        GROUP BY period_date
    )
    SELECT period_date, 'Ad-free' AS subscription_type, adfree_total / 1000 AS value FROM agg
    UNION ALL
    SELECT period_date, 'HVOD' AS subscription_type, hvod_total / 1000 AS value FROM agg
    ORDER BY period_date, subscription_type
plots:
- id: svod_subs_adfree_vs_hvod
  title: 'Number of SVOD subs (million): Ad-free vs HVOD'
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "value",
                "fill": "subscription_type",
                "stack": true
            }
        ],
        "y": {
            "label": "Million subscriptions",
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "HVOD",
                "Ad-free"
            ],
            "range": [
                "#d9dcdf",
                "#3d4952"
            ]
        }
    }
