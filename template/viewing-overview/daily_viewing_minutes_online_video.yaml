description: Daily viewing minutes of online video (Social video + Other online video)
  — population-weighted Nordic average
sql: |-
    SELECT
      n.period_date,
      CASE n.kpi_dimension
        WHEN 'social'                  THEN 'Social video'
        WHEN 'online_excluding_social' THEN 'Other online video'
      END AS business_model,
      CASE n.kpi_dimension
        WHEN 'social'                  THEN 1
        WHEN 'online_excluding_social' THEN 2
      END AS series_order,
      SUM(n.value * r.value * n.population_1574)
          / NULLIF(SUM(n.population_1574), 0) AS value
    FROM macro.nordic n
    JOIN macro.nordic r
      ON  n.country       = r.country
      AND n.period_date   = r.period_date
      AND n.kpi_dimension = r.kpi_dimension
    WHERE
      n.category           = 'online_video'
      AND n.kpi_type       = 'viewing_time'
      AND n.kpi_dimension  IN ('social', 'online_excluding_social')
      AND n.canonical_name IS NULL
      AND n.age_group      = '15-74'
      AND r.category        = 'online_video'
      AND r.kpi_type        = 'reach'
      AND r.age_group       = '15-74'
      AND n.period_date   >= '2024-07-01'
      AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
    GROUP BY n.period_date, n.kpi_dimension
    ORDER BY n.period_date, series_order
plots:
- id: daily_viewing_minutes_stacked
  title: Daily viewing minutes of online video
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "value",
                "fill": "business_model",
                "stack": true
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Minutes per day",
            "grid": true
        },
        "color": {
            "legend": true,
            "domain": [
                "Other online video",
                "Social video"
            ],
            "range": [
                "#3ecfac",
                "#b2f0e0"
            ]
        }
    }
