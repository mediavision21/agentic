description: Daily reach of online video per service — population-weighted Nordic
  average, top 6 services, grouped by service with one bar per period
sql: |-
    WITH weighted AS (
      SELECT
        period_date,
        canonical_name AS service,
        SUM(value * population) / NULLIF(SUM(population), 0) * 100 AS value
      FROM macro.nordic
      WHERE category          = 'online_video'
        AND kpi_type          = 'reach'
        AND canonical_name    IS NOT NULL
        AND kpi_dimension     IS NULL
        AND age_group         = '15-74'
        AND EXTRACT(MONTH FROM period_date) IN (1, 7)
        AND period_date       >= '2013-07-01'
      GROUP BY period_date, canonical_name
    ),
    top6 AS (
      SELECT service
      FROM weighted
      WHERE period_date = (SELECT max(period_date) FROM weighted)
      ORDER BY value DESC
      LIMIT 6
    )
    SELECT
      w.period_date,
      w.service,
      w.value
    FROM weighted w
    JOIN top6 ON w.service = top6.service
    ORDER BY w.period_date, w.value DESC
plots:
- id: daily_reach_per_service
  title: Daily reach of online video per service
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "value",
                "fill": "period_label",
                "fx": "service"
            }
        ],
        "x": {
            "label": null,
            "axis": null
        },
        "fx": {
            "label": null,
            "padding": 0.15
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "range": [
                "#1a5c38",
                "#1e6b42",
                "#237a4c",
                "#2d8f5a",
                "#38a86b",
                "#52c985"
            ]
        }
    }
