description: Top five services side by side?
sql: |-
    WITH base AS (
      SELECT
        n.period_date,
        n.country,
        n.canonical_name AS service,
        n.value,
        n.population_household
      FROM macro.nordic n
      WHERE n.category       = 'online_video'
        AND n.kpi_type       = 'penetration'
        AND n.kpi_dimension  = 'svod'
        AND n.canonical_name IS NOT NULL
        AND n.age_group      = '15-74'
        AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
        AND n.country        IN ('sweden', 'norway', 'denmark', 'finland')
    ),
    latest_shared AS (
      SELECT MIN(max_pd) AS latest_period_date
      FROM (SELECT country, MAX(period_date) AS max_pd FROM base GROUP BY country) x
    ),
    -- Population-weighted penetration per service per period (all periods)
    weighted AS (
      SELECT
        b.period_date,
        b.service,
        SUM(b.value * b.population_household) / NULLIF(SUM(b.population_household), 0) * 100 AS penetration_pct
      FROM base b
      GROUP BY b.period_date, b.service
    ),
    top5 AS (
      SELECT service
      FROM weighted
      WHERE period_date = (SELECT latest_period_date FROM latest_shared)
      ORDER BY penetration_pct DESC
      LIMIT 5
    ),
    -- Two most recent periods for top5 services
    recent_periods AS (
      SELECT DISTINCT period_date
      FROM weighted
      WHERE service IN (SELECT service FROM top5)
      ORDER BY period_date DESC
      LIMIT 2
    )
    SELECT
      w.period_date,
      w.service,
      ROUND((w.penetration_pct)::numeric, 1) AS value
    FROM weighted w
    JOIN top5 ON w.service = top5.service
    JOIN recent_periods rp ON w.period_date = rp.period_date
    ORDER BY w.period_date, w.penetration_pct DESC
plots:
- id: chart
  title: Top five services side by side?
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_date",
                "y": "value",
                "fill": "period_date",
                "fx": "service"
            }
        ],
        "x": {
            "label": null,
            "axis": null
        },
        "fx": {
            "label": null,
            "padding": 0.15,
            "tickRotate": 20
        },
        "y": {
            "label": "Penetration %",
            "grid": true
        },
        "color": {
            "legend": true,
            "tickFormat": "fmtPeriod",
            "range": [
                "#c7e8c7",
                "#52a852"
            ]
        }
    }
