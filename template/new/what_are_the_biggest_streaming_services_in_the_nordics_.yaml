description: What are the biggest streaming services in the nordics?
sql: |-
  WITH base AS (
      SELECT
          n.period_date,
          n.country,
          n.canonical_name AS service,
          n.value AS penetration_country,
          n.population_household
      FROM macro.nordic n
      WHERE
          n.category = 'online_video'
          AND n.kpi_type = 'penetration'
          AND n.kpi_dimension = 'svod'
          AND n.canonical_name IS NOT NULL
          AND n.age_group = '15-74'
          AND n.population_segment IS NULL
          AND n.value IS NOT NULL
          AND n.value > 0
          AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
  ),
  penetration_weighted AS (
      SELECT
          period_date,
          service,
          SUM(penetration_country * population_household)
              / NULLIF(SUM(population_household), 0) AS penetration_household_weighted
      FROM base
      GROUP BY period_date, service
  ),
  latest_period AS (
      SELECT MAX(period_date) AS max_period_date
      FROM penetration_weighted
  ),
  service_rank AS (
      SELECT
          service,
          ROW_NUMBER() OVER (ORDER BY penetration_household_weighted DESC) AS service_rank
      FROM penetration_weighted
      WHERE period_date = (SELECT max_period_date FROM latest_period)
  ),
  top_services AS (
      SELECT service, service_rank
      FROM service_rank
      WHERE service_rank <= 15
  ),
  periods AS (
      SELECT DISTINCT period_date
      FROM penetration_weighted
  ),
  service_period_grid AS (
      SELECT
          ts.service,
          ts.service_rank,
          p.period_date
      FROM top_services ts
      CROSS JOIN periods p
  )
  SELECT
      g.period_date,
      g.service,
      g.service_rank,
      ROUND((pw.penetration_household_weighted * 100)::numeric, 1) AS value
  FROM service_period_grid g
  LEFT JOIN penetration_weighted pw
    ON pw.service = g.service
   AND pw.period_date = g.period_date
  ORDER BY
      g.service_rank,
      g.period_date;
