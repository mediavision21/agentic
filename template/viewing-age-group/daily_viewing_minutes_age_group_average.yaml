description: Daily viewing minutes of video averaged across age groups (Social video,
  Other online video, TV) — population-weighted Nordic average
sql: |-
    WITH reach AS (
      SELECT
        country,
        period_date,
        age_group,
        population_1574,
        CASE
          WHEN category = 'online_video' AND kpi_dimension = 'social' THEN 'Social video'
          WHEN category = 'online_video' AND kpi_dimension = 'online_excluding_social' THEN 'Other online video'
          WHEN category = 'tv' THEN 'TV'
        END AS business_model,
        value AS reach
      FROM macro.nordic
      WHERE canonical_name IS NULL
        AND age_group IN ('15-24', '25-34', '35-44', '45-54', '55-64', '65-74')
        AND (
          (category = 'online_video' AND kpi_type = 'reach' AND kpi_dimension IN ('social', 'online_excluding_social'))
          OR
          (category = 'tv' AND kpi_type = 'reach')
        )
    ),
    viewing_time AS (
      SELECT
        country,
        period_date,
        age_group,
        CASE
          WHEN category = 'online_video' AND kpi_dimension = 'social' THEN 'Social video'
          WHEN category = 'online_video' AND kpi_dimension = 'online_excluding_social' THEN 'Other online video'
          WHEN category = 'tv' THEN 'TV'
        END AS business_model,
        value AS viewing_time_viewers
      FROM macro.nordic
      WHERE canonical_name IS NULL
        AND age_group IN ('15-24', '25-34', '35-44', '45-54', '55-64', '65-74')
        AND (
          (category = 'online_video' AND kpi_type = 'viewing_time' AND kpi_dimension IN ('social', 'online_excluding_social'))
          OR
          (category = 'tv' AND kpi_type = 'viewing_time')
        )
    ),
    agg_age AS (
      SELECT
        r.period_date,
        r.age_group,
        r.business_model,
        SUM(r.reach * vt.viewing_time_viewers * r.population_1574)
          / NULLIF(SUM(r.population_1574), 0) AS viewing_time_population
      FROM reach r
      JOIN viewing_time vt
        ON r.country = vt.country
       AND r.period_date = vt.period_date
       AND r.age_group = vt.age_group
       AND r.business_model = vt.business_model
      -- population_1574 is always 15-74 individuals regardless of age_group row
      WHERE r.period_date >= '2024-07-01'
        AND EXTRACT(MONTH FROM r.period_date) IN (1, 7)
        AND r.reach IS NOT NULL
        AND vt.viewing_time_viewers IS NOT NULL
      GROUP BY
        r.period_date,
        r.age_group,
        r.business_model
    ),
    agg AS (
      SELECT
        period_date,
        business_model,
        AVG(viewing_time_population) AS viewing_time_population
      FROM agg_age
      GROUP BY
        period_date,
        business_model
    )
    SELECT
      period_date,
      business_model,
      CASE business_model
        WHEN 'Social video' THEN 1
        WHEN 'Other online video' THEN 2
        WHEN 'TV' THEN 3
        ELSE 99
      END AS series_order,
      viewing_time_population AS value
    FROM agg
    ORDER BY period_date, series_order
plots:
- id: daily_viewing_minutes_age_group_average
  title: Daily viewing minutes of video
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_date",
                "y": "value",
                "fill": "period_date",
                "fx": "business_model"
            }
        ],
        "fx": {
            "label": null,
            "domain": [
                "Social video",
                "Other online video",
                "TV"
            ],
            "padding": 0.22
        },
        "x": {
            "label": null,
            "axis": null
        },
        "y": {
            "label": null,
            "grid": true
        },
        "color": {
            "legend": true,
            "scheme": "greens"
        }
    }
