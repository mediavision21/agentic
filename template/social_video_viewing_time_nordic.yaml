description: Daily viewing time of social video (minutes/day) across Nordic countries,
  population-weighted average
sql: |-
    SELECT
        n.period_date,
        SUM(n.value * n.population) / NULLIF(SUM(n.population), 0) AS value
    FROM macro.nordic n
    WHERE
        n.category = 'online_video'
        AND n.kpi_type = 'viewing_time'
        AND n.kpi_dimension = 'social'
        -- AND n.canonical_name IS NULL
        AND n.age_group = '15-74'
        AND EXTRACT(MONTH FROM n.period_date) IN (1, 7)
        [[ AND {{country}} ]]
        [[ AND {{year}} ]]
        [[ AND {{quarter_label}} ]]
    GROUP BY
        n.period_date
    ORDER BY
        n.period_date;
plots:
- id: social_video_viewing_time_trend
  title: Daily viewing time of social video — trend
  config: |-
    {
        "marks": [
            {
                "type": "lineY",
                "x": "period_label",
                "y": "value",
                "stroke": "#1a5c38",
                "curve": "catmull-rom"
            },
            {
                "type": "dot",
                "x": "period_label",
                "y": "value",
                "fill": "#1a5c38"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Minutes per day",
            "grid": true,
            "domain": [
                0,
                60
            ]
        }
    }
- id: social_video_viewing_time_compare
  title: Daily viewing time of social video — latest vs year-ago
  config: |-
    {
        "marks": [
            {
                "type": "barY",
                "x": "period_label",
                "y": "value",
                "fill": "period_label"
            }
        ],
        "x": {
            "label": null
        },
        "y": {
            "label": "Minutes per day",
            "grid": true,
            "domain": [
                0,
                60
            ]
        },
        "color": {
            "legend": true,
            "scheme": "greens"
        }
    }
