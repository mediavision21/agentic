# ── multi-intention prompts (ambiguous or compound queries) ───────────────────

- prompt: "Compare Netflix and Viaplay subscriber bases in the Nordics"
  intentions:
    - kpi_type: penetration_service
      service_id: netflix
    - kpi_type: penetration_service
      service_id: viaplay

- prompt: "How does Netflix reach compare to YouTube reach?"
  intentions:
    - kpi_type: reach_service
      service_id: netflix
    - kpi_type: reach_service
      service_id: youtube

- prompt: "Show me both SVOD penetration and average monthly spend on standalone SVOD"
  intentions:
    - kpi_type: penetration
      kpi_dimension: svod
    - kpi_type: spend
      kpi_dimension: ssvod

- prompt: "How does total SVOD reach compare to social media reach?"
  intentions:
    - kpi_type: reach
      kpi_dimension: svod
    - kpi_type: reach
      kpi_dimension: social

- prompt: "What is the stacking level and churn intention among SVOD households?"
  intentions:
    - kpi_type: stacking
      kpi_dimension: svod
    - kpi_type: churn_intention
      kpi_dimension: svod

- prompt: "Compare daily reach of TikTok, Instagram and YouTube"
  intentions:
    - kpi_type: reach_service
      service_id: tiktok
    - kpi_type: reach_service
      service_id: instagram
    - kpi_type: reach_service
      service_id: youtube

- prompt: "How does Netflix viewing time compare to TikTok viewing time among users?"
  intentions:
    - kpi_type: viewing_time_service
      service_id: netflix
    - kpi_type: viewing_time_service
      service_id: tiktok

- prompt: "Show penetration and churn intention for Viaplay"
  intentions:
    - kpi_type: penetration_service
      service_id: viaplay
    - kpi_type: churn_intention_service
      service_id: viaplay

- prompt: "What are the reach figures for public service broadcasters vs SVOD?"
  intentions:
    - kpi_type: reach
      kpi_dimension: public_service
    - kpi_type: reach
      kpi_dimension: svod

- prompt: "How does household spend differ between standalone SVOD and pay TV operators?"
  intentions:
