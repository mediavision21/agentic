# Mediavision Data Agent — Prompt Evaluation Dataset
# Format: each prompt maps to one or more (kpi_type + kpi_dimension) or (kpi_type + service_id) intentions.
# Used for agent prompt evaluation and SQL generation optimization.

# ── kpi_type + kpi_dimension combinations ────────────────────────────────────

- prompt: "What share of Nordic households subscribe to SVOD services?"
  intentions:
    - kpi_type: penetration
      kpi_dimension: svod

- prompt: "How has standalone SVOD uptake changed over the last two years?"
  intentions:
    - kpi_type: penetration
      kpi_dimension: ssvod

- prompt: "How many households have a bundled SVOD subscription through their operator?"
  intentions:
    - kpi_type: penetration
      kpi_dimension: bsvod

- prompt: "What proportion of households have access to a pay TV channel package?"
  intentions:
    - kpi_type: penetration
      kpi_dimension: pay_tv_channel

- prompt: "How widespread is illegal IPTV usage across the Nordic countries?"
  intentions:
    - kpi_type: penetration
      kpi_dimension: illegal_iptv

- prompt: "What percentage of households have a TV Everywhere subscription?"
  intentions:
    - kpi_type: penetration
      kpi_dimension: tve

- prompt: "How many people watch free-to-air TV on a daily basis?"
  intentions:
    - kpi_type: reach
      kpi_dimension: svod

- prompt: "What is the daily reach of SVOD services in Sweden?"
  intentions:
    - kpi_type: reach
      kpi_dimension: svod

- prompt: "How many people use standalone SVOD services on a given day?"
  intentions:
    - kpi_type: reach
      kpi_dimension: ssvod

- prompt: "What is the daily reach of ad-supported streaming (AVOD)?"
  intentions:
    - kpi_type: reach
      kpi_dimension: avod

- prompt: "How many people watch hybrid VOD content daily?"
  intentions:
    - kpi_type: reach
      kpi_dimension: hvod

- prompt: "What is the total online video reach including social media?"
  intentions:
    - kpi_type: reach
      kpi_dimension: online_total

- prompt: "How many people watch online video excluding social platforms?"
  intentions:
    - kpi_type: reach
      kpi_dimension: online_excluding_social

- prompt: "What is the daily reach of social media video like TikTok and Instagram?"
  intentions:
    - kpi_type: reach
      kpi_dimension: social

- prompt: "How many people consume public service broadcaster content daily?"
  intentions:
    - kpi_type: reach
      kpi_dimension: public_service

- prompt: "What is the reach of ad-supported OTT services?"
  intentions:
    - kpi_type: reach
      kpi_dimension: ads_ott

- prompt: "How many people watch FAST channels like Pluto TV or Samsung TV+?"
  intentions:
    - kpi_type: reach
      kpi_dimension: fast

- prompt: "What genres do people watch most when streaming online video?"
  intentions:
    - kpi_type: reach
      kpi_dimension: genre

- prompt: "How much time do SVOD subscribers spend watching per day?"
  intentions:
    - kpi_type: viewing_time
      kpi_dimension: ssvod

- prompt: "What is the average daily viewing time on bundled SVOD services?"
  intentions:
    - kpi_type: viewing_time
      kpi_dimension: bsvod

- prompt: "How long do people spend watching hybrid VOD content daily?"
  intentions:
    - kpi_type: viewing_time
      kpi_dimension: hvod

- prompt: "How much time do people spend on social video platforms each day?"
  intentions:
    - kpi_type: viewing_time
      kpi_dimension: social

- prompt: "What is the daily viewing time for online video excluding social media?"
  intentions:
    - kpi_type: viewing_time
      kpi_dimension: online_excluding_social

- prompt: "How many minutes per day do viewers spend watching AVOD content?"
  intentions:
    - kpi_type: viewing_time
      kpi_dimension: avod

- prompt: "How does viewing time differ across genres like drama, sports and news?"
  intentions:
    - kpi_type: viewing_time
      kpi_dimension: genre

- prompt: "What do Nordic households spend per month on standalone SVOD services?"
  intentions:
    - kpi_type: spend
      kpi_dimension: ssvod

- prompt: "How many SVOD services does the average Nordic household subscribe to?"
  intentions:
    - kpi_type: stacking
      kpi_dimension: svod

- prompt: "What is the average number of standalone streaming services per household?"
  intentions:
    - kpi_type: stacking
      kpi_dimension: ssvod

- prompt: "How many hybrid/ad-supported SVOD services does a household typically have?"
  intentions:
    - kpi_type: stacking
      kpi_dimension: hvod

- prompt: "What share of SVOD subscribers intend to cancel their subscription?"
  intentions:
    - kpi_type: churn_intention
      kpi_dimension: svod

- prompt: "How many households share or plan to share their SVOD account?"
  intentions:
    - kpi_type: account_sharing
      kpi_dimension: svod

- prompt: "What share of standalone SVOD users share account credentials?"
  intentions:
    - kpi_type: account_sharing
      kpi_dimension: ssvod

- prompt: "What is the weekly online video reach in Sweden?"
  intentions:
    - kpi_type: reach_weekly
      kpi_dimension: online_total

